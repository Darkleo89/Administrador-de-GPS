/**
 * Valida una serie y autocompleta su tipo en el select correspondiente
 * @param {string} serie - Serie del dispositivo
 * @param {string} tipoDispositivo - 'gateway' o 'camara'
 */
function validarYAutocompletarTipo(serie, tipoDispositivo) {
  if (!serie || serie.length < 10) {
    return;
  }
  
  // Validar formato básico
  var regexSerie = /^[A-Z0-9]{4}-[A-Z0-9]{3}-[A-Z0-9]{3}$/;
  if (!regexSerie.test(serie)) {
    return;
  }
  
  console.log('🔍 Validando serie:', serie, 'para:', tipoDispositivo);
  
  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        console.warn('Error al validar serie:', resp.error);
        return;
      }
      
      // Determinar el select según el tipo de dispositivo
      var selectId = (tipoDispositivo === 'gateway') ? 'tipo-gateway' : 'tipo-camara';
      var select = document.getElementById(selectId);
      if (!select) return;
      
      // Si la serie no está instalada o no existe, mostrar advertencia
      if (!resp.existe) {
        mostrarToast('⚠️ La serie ' + serie + ' no existe en el inventario.', 'warning');
        return;
      }
      
      // Obtener el tipo de la serie desde el inventario
      var tipoEncontrado = resp.tipo || '';
      var estado = resp.estado || '';
      
      console.log('📋 Tipo encontrado:', tipoEncontrado, 'Estado:', estado);
      
      // Verificar si el tipo coincide con el dispositivo esperado
      var tipoUpper = tipoEncontrado.toUpperCase();
      var esGateway = (tipoUpper.indexOf('VG') !== -1 || tipoUpper.indexOf('GATEWAY') !== -1);
      var esCamara = (tipoUpper.indexOf('CM') !== -1 || tipoUpper.indexOf('CAMARA') !== -1);
      
      if (tipoDispositivo === 'gateway' && !esGateway) {
        mostrarToast('⚠️ La serie ' + serie + ' no corresponde a un Gateway (tipo: ' + tipoEncontrado + ')', 'warning');
        // Si es una cámara, sugerir mover al campo correcto
        if (esCamara) {
          mostrarToast('💡 Esta serie parece ser una Cámara. Deberías colocarla en el campo de Cámara.', 'info');
        }
        return;
      }
      
      if (tipoDispositivo === 'camara' && !esCamara) {
        mostrarToast('⚠️ La serie ' + serie + ' no corresponde a una Cámara (tipo: ' + tipoEncontrado + ')', 'warning');
        if (esGateway) {
          mostrarToast('💡 Esta serie parece ser un Gateway. Deberías colocarla en el campo de Gateway.', 'info');
        }
        return;
      }
      
      // ✅ Buscar el tipo en el select y seleccionarlo
      var encontrado = false;
      for (var i = 0; i < select.options.length; i++) {
        var optionText = select.options[i].text.toUpperCase();
        // Buscar coincidencia parcial (ej. "VG54" en "VG54 (Gateway VG54)")
        if (optionText.indexOf(tipoEncontrado.toUpperCase()) !== -1) {
          select.selectedIndex = i;
          encontrado = true;
          console.log('✅ Tipo seleccionado automáticamente:', select.options[i].text);
          mostrarToast('✅ Tipo ' + tipoEncontrado + ' seleccionado automáticamente.', 'success');
          break;
        }
      }
      
      if (!encontrado) {
        console.warn('⚠️ No se encontró el tipo', tipoEncontrado, 'en el select');
        // Intentar buscar por nombre
        for (var j = 0; j < select.options.length; j++) {
          if (select.options[j].text.toUpperCase().indexOf(tipoEncontrado.toUpperCase()) !== -1) {
            select.selectedIndex = j;
            encontrado = true;
            console.log('✅ Tipo encontrado por nombre:', select.options[j].text);
            break;
          }
        }
      }
      
    })
    .withFailureHandler(function(err) {
      console.error('Error al validar serie:', err.message);
    })
    .obtenerTipoPorSerie(APP.token, serie);
}

/**
 * Convierte una URL de Drive a URL de descarga directa
 */
function _convertirUrlDriveADirecta(url) {
  // Extraer el ID del archivo
  var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match && match[1]) {
    return 'https://drive.google.com/uc?export=view&id=' + match[1];
  }
  return url;
}
/**
 * Verifica si un vehículo tiene equipos instalados antes de permitir instalación
 * @param {string} economico - ID del vehículo
 * @returns {Promise} - Resuelve con { tieneEquipos, gateway, camara }
 */
function verificarEquiposVehiculo(economico) {
  return new Promise(function(resolve, reject) {
    if (!economico || economico.trim() === '') {
      resolve({ tieneEquipos: false, gateway: null, camara: null });
      return;
    }

    google.script.run
      .withSuccessHandler(function(resp) {
        resolve(resp);
      })
      .withFailureHandler(function(err) {
        reject(err);
      })
      .verificarEquiposVehiculoBackend(APP.token, economico);
  });
}

  var filtroEstado = document.getElementById('fil-inv-estado')?.value || '';
  var filtroTipo = document.getElementById('fil-inv-tipo')?.value || '';
  var filtroTipoUnidad = document.getElementById('fil-inv-tipo-unidad')?.value || '';
  var filtroBuscar = document.getElementById('fil-inv-buscar')?.value || '';
  
  console.log('📌 Filtros:', { filtroEstado, filtroTipo, filtroTipoUnidad, filtroBuscar });
  
  google.script.run
    .withSuccessHandler(function(resp) {
      console.log('✅ Respuesta de obtenerInventario:', resp);
      
      if (!resp.ok) {
        mostrarToast(resp.error || 'Error al cargar inventario', 'error');
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-danger py-3">Error al cargar inventario</td></tr>';
        return;
      }
      
      if (!resp.equipos || resp.equipos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-3">No hay equipos en el inventario</td></tr>';
        document.getElementById('inv-total').textContent = 'Total: 0 equipos';
        return;
      }
      
      // ✅ APLICAR FILTROS EN CLIENTE
      var equiposFiltrados = resp.equipos.filter(function(e) {
        var coincide = true;
        
        if (filtroEstado && e.estado !== filtroEstado) coincide = false;
        if (filtroTipo && e.tipo !== filtroTipo) coincide = false;
        if (filtroTipoUnidad && e.tipoUnidad !== filtroTipoUnidad) coincide = false;
        if (filtroBuscar) {
          var busqueda = filtroBuscar.toUpperCase().trim();
          var serie = (e.serie || '').toUpperCase();
          var economico = (e.economico || '').toUpperCase();
          if (serie.indexOf(busqueda) === -1 && economico.indexOf(busqueda) === -1) {
            coincide = false;
          }
        }
        return coincide;
      });
      
      // ✅ ACTUALIZAR RESUMEN DE ESTADOS
      var totalDisponibles = 0;
      var totalInstalados = 0;
      var totalGarantia = 0;
      var totalBaja = 0;
      
      resp.equipos.forEach(function(e) {
        if (e.estado === 'Disponible') totalDisponibles++;
        else if (e.estado === 'Instalado') totalInstalados++;
        else if (e.estado === 'Garantía') totalGarantia++;
        else if (e.estado === 'Baja') totalBaja++;
      });
      
      document.getElementById('inv-disponibles').textContent = totalDisponibles;
      document.getElementById('inv-instalados').textContent = totalInstalados;
      document.getElementById('inv-garantia').textContent = totalGarantia;
      document.getElementById('inv-baja').textContent = totalBaja;
      
      // ✅ RENDERIZAR TABLA
      tbody.innerHTML = '';
      
      equiposFiltrados.forEach(function(e) {
        var tr = document.createElement('tr');
        
        // Badge según estado
        var badgeCls = '';
        if (e.estado === 'Disponible') {
          badgeCls = 'badge bg-success';
        } else if (e.estado === 'Instalado') {
          badgeCls = 'badge bg-primary';
        } else if (e.estado === 'Garantía') {
          badgeCls = 'badge bg-warning text-dark';
        } else if (e.estado === 'Baja') {
          badgeCls = 'badge bg-danger';
        } else {
          badgeCls = 'badge bg-secondary';
        }
        
        // Icono según tipo
        var iconoTipo = e.tipo && e.tipo.toString().toUpperCase().indexOf('VG') !== -1 ? '📡' : '📷';
        
        // ✅ Fecha de instalación formateada
        var fechaInstalacion = e.fechaInstalacion || '—';
        if (e.fechaInstalacion && e.fechaInstalacion !== '') {
          try {
            var fechaObj = new Date(e.fechaInstalacion);
            if (!isNaN(fechaObj.getTime())) {
              fechaInstalacion = Utilities.formatDate(fechaObj, Session.getScriptTimeZone(), 'dd/MM/yyyy');
            }
          } catch(err) {
            fechaInstalacion = e.fechaInstalacion;
          }
        }
        
        // ✅ Obtener el tipo de unidad desde el inventario (columna 12)
        var tipoUnidad = e.tipoUnidad || '';
        var tieneEconomico = e.economico && e.economico.trim() !== '';
        var estaInstalado = e.estado === 'Instalado';
        var estaEnGarantia = e.estado === 'Garantía';
        
        // Construir el badge de tipo de unidad
        var badgeTipoUnidad = '—';
        var badgeClassTipo = '';
        var onclickAttr = '';
        var tooltip = '';
        
        // ✅ MODIFICADO: Mostrar badge también en Garantía (tienen económico asignado)
        if (tieneEconomico && (estaInstalado || estaEnGarantia)) {
          if (tipoUnidad !== '') {
            badgeClassTipo = 'badge bg-secondary';
            onclickAttr = `onclick="editarTipoUnidadDesdeInventario('${e.economico}')"`;
            badgeTipoUnidad = tipoUnidad;
            tooltip = 'Click para editar';
          } else {
            badgeClassTipo = 'badge bg-warning text-dark';
            onclickAttr = `onclick="editarTipoUnidadDesdeInventario('${e.economico}')"`;
            badgeTipoUnidad = '⚠️ Sin tipo';
            tooltip = 'Click para asignar tipo';
          }
        }
        
        tr.innerHTML = `
          <td><code style="font-size:12px;">${e.serie || '—'}</code></td>
          <td>${e.modelo || '—'}</td>
          <td>${iconoTipo} ${e.tipo || '—'}</td>
          <td><code style="font-size:11px;">${e.imei || '—'}</code></td>
          <td><span class="${badgeCls}" style="font-size:11px;">${e.estado || '—'}</span></td>
          <td><strong>${e.economico || '—'}</strong></td>
          <td>${fechaInstalacion}</td>
          <td>${e.tipoUnidad || '—'}</td>
          <td>
            ${(tieneEconomico && (estaInstalado || estaEnGarantia)) ? `
              <span class="${badgeClassTipo}" style="font-size:10px;cursor:${onclickAttr ? 'pointer' : 'default'};" 
                    ${onclickAttr} title="${tooltip}">
                ${badgeTipoUnidad}
              </span>
            ` : '—'}
          </td>
          <td style="white-space: nowrap;">
            <button class="btn btn-sm btn-outline-primary" onclick="verDetalleInventario('${e.serie}')" title="Ver detalle" style="padding:2px 6px;font-size:12px;margin-right:2px;">
              <i class="bi bi-eye"></i>
            </button>
            ${APP.sesion && APP.sesion.rol <= 2 ? `
              <button class="btn btn-sm btn-outline-success" onclick="editarEquipoInventario('${e.serie}')" title="Editar equipo" style="padding:2px 6px;font-size:12px;margin-right:2px;">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-secondary" 
                      onclick="cambiarEstadoInventario('${e.serie}', '${e.estado}', '${e.economico || ''}')" 
                      title="Cambiar estado" style="padding:2px 6px;font-size:12px;">
                <i class="bi bi-arrow-repeat"></i>
              </button>
            ` : ''}
          </td>
        `;
        tbody.appendChild(tr);
      });
      
      // Actualizar total
      document.getElementById('inv-total').textContent = 'Total: ' + equiposFiltrados.length + ' equipos';
      
      if (equiposFiltrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-3">No hay equipos con los filtros seleccionados</td></tr>';
      }
      
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error al cargar inventario:', err);
      tbody.innerHTML = '<tr><td colspan="10" class="text-center text-danger py-3">Error: ' + err.message + '</td></tr>';
    })
    .obtenerInventarioGPS(APP.token);
}

/**
 * Abre el modal para cambiar estado de un equipo
 * @param {string} serie - Serie del equipo
 * @param {string} estadoActual - Estado actual
 * @param {string} economicoActual - Económico actual (si tiene)
 */
function cambiarEstadoInventario(serie, estadoActual, economicoActual) {
  console.log('🔄 cambiarEstadoInventario - Serie:', serie, 'Estado:', estadoActual);
  
  // ✅ Verificar permisos (solo Revisor/Admin)
  if (!APP.sesion || APP.sesion.rol > 2) {
    mostrarToast('⚠️ No tienes permisos para cambiar estados.', 'error');
    return;
  }
  
  // ✅ Crear modal dinámico para cambiar estado
  var modalHtml = `
    <div class="modal fade" id="modalCambiarEstado" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">🔄 Cambiar estado - ${serie}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Estado actual</label>
              <p><span class="badge ${estadoActual === 'Disponible' ? 'bg-success' : estadoActual === 'Instalado' ? 'bg-primary' : estadoActual === 'Garantía' ? 'bg-warning text-dark' : 'bg-danger'}">${estadoActual || 'Desconocido'}</span></p>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Nuevo estado <span class="text-danger">*</span></label>
              <select id="nuevo-estado-select" class="form-select">
                <option value="">Selecciona un estado...</option>
                <option value="Disponible" ${estadoActual === 'Disponible' ? 'selected' : ''}>🟢 Disponible</option>
                <option value="Instalado" ${estadoActual === 'Instalado' ? 'selected' : ''}>🔵 Instalado</option>
                <option value="Garantía" ${estadoActual === 'Garantía' ? 'selected' : ''}>🟡 Garantía</option>
                <option value="Baja" ${estadoActual === 'Baja' ? 'selected' : ''}>🔴 Baja</option>
              </select>
            </div>
            
            <div class="mb-3" id="campo-economico-container" style="display:${estadoActual === 'Instalado' ? 'block' : 'none'};">
              <label class="form-label">Económico asignado</label>
              <input type="text" id="nuevo-economico-input" class="form-control" placeholder="Ej: G-361" value="${economicoActual || ''}">
              <small class="text-muted">Dejar vacío para liberar el equipo</small>
            </div>
            
            <div class="mb-3" id="campo-ticket-container" style="display:none;">
              <label class="form-label">Ticket de garantía</label>
              <input type="text" id="nuevo-ticket-input" class="form-control" placeholder="Ej: TKT-2026-001">
              <small class="text-muted">Número de ticket para seguimiento de garantía</small>
            </div>
            
            <div class="mb-3" id="campo-observaciones-container">
              <label class="form-label">Observaciones (opcional)</label>
              <textarea id="nuevo-observaciones-input" class="form-control" rows="2" placeholder="Motivo del cambio..."></textarea>
            </div>
            
            <div id="cambio-estado-info" class="alert alert-info small">
              <i class="bi bi-info-circle me-1"></i>
              <span id="cambio-estado-mensaje">Selecciona un nuevo estado para continuar.</span>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmarCambioEstado('${serie}')" id="btn-confirmar-cambio">
              <i class="bi bi-check me-1"></i>Confirmar cambio
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
  
  // ✅ Remover modal anterior si existe
  var modalExistente = document.getElementById('modalCambiarEstado');
  if (modalExistente) {
    modalExistente.remove();
  }
  
  // ✅ Agregar modal al DOM
  var div = document.createElement('div');
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
  
  // ✅ Mostrar modal
  var modal = new bootstrap.Modal(document.getElementById('modalCambiarEstado'));
  modal.show();
  
  // ✅ Eventos dinámicos del modal
  var selectEstado = document.getElementById('nuevo-estado-select');
  var campoEconomico = document.getElementById('campo-economico-container');
  var campoTicket = document.getElementById('campo-ticket-container');
  var mensajeInfo = document.getElementById('cambio-estado-mensaje');
  
  selectEstado.addEventListener('change', function() {
    var estado = this.value;
    
    // Mostrar/ocultar campos según estado
    if (estado === 'Instalado') {
      campoEconomico.style.display = 'block';
      campoTicket.style.display = 'none';
      mensajeInfo.textContent = '📌 Asigna un número económico para instalar el equipo.';
    } else if (estado === 'Disponible') {
      campoEconomico.style.display = 'block';
      campoTicket.style.display = 'none';
      mensajeInfo.textContent = '📌 El equipo quedará disponible. El económico se liberará automáticamente.';
    } else if (estado === 'Garantía') {
      campoEconomico.style.display = 'none';
      campoTicket.style.display = 'block';
      mensajeInfo.textContent = '📌 Registra el ticket de garantía para dar seguimiento.';
    } else if (estado === 'Baja') {
      campoEconomico.style.display = 'none';
      campoTicket.style.display = 'none';
      mensajeInfo.textContent = '⚠️ El equipo quedará marcado como BAJA. Esta acción es irreversible.';
    } else {
      campoEconomico.style.display = 'none';
      campoTicket.style.display = 'none';
      mensajeInfo.textContent = 'Selecciona un nuevo estado para continuar.';
    }
  });
}
/**
 * Confirma el cambio de estado
 * @param {string} serie - Serie del equipo
 */
function confirmarCambioEstado(serie) {
  console.log('✅ confirmarCambioEstado - Serie:', serie);
  
  var nuevoEstado = document.getElementById('nuevo-estado-select').value;
  var economico = document.getElementById('nuevo-economico-input').value.trim();
  var ticket = document.getElementById('nuevo-ticket-input').value.trim();
  var observaciones = document.getElementById('nuevo-observaciones-input').value.trim();
  
  // ✅ Validar que se seleccionó un estado
  if (!nuevoEstado) {
    mostrarToast('⚠️ Debes seleccionar un nuevo estado.', 'error');
    return;
  }
  
  // ✅ Validar que si es Instalado, tenga económico
  if (nuevoEstado === 'Instalado' && !economico) {
    mostrarToast('⚠️ Para instalar el equipo, debes asignar un número económico.', 'error');
    document.getElementById('nuevo-economico-input').focus();
    return;
  }
  
  // ✅ Validar que si es Garantía, tenga ticket
  if (nuevoEstado === 'Garantía' && !ticket) {
    mostrarToast('⚠️ Para marcar como garantía, debes registrar un ticket.', 'error');
    document.getElementById('nuevo-ticket-input').focus();
    return;
  }
  
  // ✅ Confirmar acción
  var mensajeConfirmacion = '¿Confirmas cambiar el estado del equipo ' + serie + ' a "' + nuevoEstado + '"?';
  if (nuevoEstado === 'Instalado') {
    mensajeConfirmacion += '\n\n📌 Se asignará al económico: ' + economico;
  }
  if (nuevoEstado === 'Baja') {
    mensajeConfirmacion += '\n\n⚠️ Esta acción es irreversible.';
  }
  
  if (!confirm(mensajeConfirmacion)) {
    return;
  }
  
  // ✅ Mostrar loading
  mostrarToast('🔄 Actualizando estado...', 'info');
  document.getElementById('btn-confirmar-cambio').disabled = true;
  
  // ✅ Llamar al backend
  google.script.run
    .withSuccessHandler(function(resp) {
      if (resp.ok) {
        mostrarToast('✅ Estado actualizado a "' + nuevoEstado + '"', 'success');
        // Cerrar modal
        var modal = bootstrap.Modal.getInstance(document.getElementById('modalCambiarEstado'));
        if (modal) modal.hide();
        // Recargar inventario
        cargarInventario();
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
        document.getElementById('btn-confirmar-cambio').disabled = false;
      }
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error en confirmarCambioEstado:', err);
      mostrarToast('❌ Error: ' + err.message, 'error');
      document.getElementById('btn-confirmar-cambio').disabled = false;
    })
    .actualizarEstadoInventario(APP.token, serie, nuevoEstado, economico, ticket, observaciones);
}

/**
 * Guarda un nuevo equipo en el inventario (solo Admin)
 */
function guardarNuevoEquipo() {
  var serie = document.getElementById('new-serie').value.trim();
  var tipo = document.getElementById('new-tipo').value;
  var modelo = document.getElementById('new-modelo').value.trim();
  var imei = document.getElementById('new-imei').value.trim();
  var estado = document.getElementById('new-estado').value;
  var economico = document.getElementById('new-economico').value.trim();
  var observaciones = document.getElementById('new-observaciones').value.trim();
  
  // Validar serie
  if (!serie) {
    mostrarToast('⚠️ La serie es obligatoria.', 'error');
    document.getElementById('new-serie').focus();
    return;
  }
  
  // Validar formato de serie (4-3-3)
  var regexSerie = /^[A-Z0-9]{4}-[A-Z0-9]{3}-[A-Z0-9]{3}$/;
  if (!regexSerie.test(serie.toUpperCase())) {
    mostrarToast('⚠️ Formato de serie inválido. Usa: XXXX-XXX-XXX', 'error');
    document.getElementById('new-serie').focus();
    return;
  }
  
  mostrarToast('📦 Guardando equipo...', 'info');
  
  google.script.run
    .withSuccessHandler(function(resp) {
      if (resp.ok) {
        mostrarToast('✅ Equipo agregado correctamente', 'success');
        // Cerrar modal
        var modal = bootstrap.Modal.getInstance(document.getElementById('modalAgregarEquipo'));
        if (modal) modal.hide();
        // Recargar inventario
        cargarInventario();
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .agregarEquipoInventario(APP.token, {
      serie: serie.toUpperCase(),
      tipo: tipo,
      modelo: modelo,
      imei: imei,
      estado: estado,
      economico: economico,
      observaciones: observaciones
    });
}

/**
 * Obtiene los tipos de unidad desde el catálogo (con Promise)
 * @returns {Promise} - Resuelve con array de tipos
 */
function obtenerTiposUnidad() {
  return new Promise(function(resolve, reject) {
    if (!APP.token) {
      reject(new Error('Sesión expirada.'));
      return;
    }

    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp.ok) {
          resolve(resp.tipos || []);
        } else {
          reject(new Error(resp.error || 'Error al cargar tipos'));
        }
      })
      .withFailureHandler(function(err) {
        reject(err);
      })
      .obtenerTiposUnidad(APP.token);
  });
}
/**
 * Carga los tipos de unidad en un dropdown (usando caché)
 * @param {string} selectId - ID del select
 * @param {string} valorSeleccionado - Valor a seleccionar (opcional)
 */
function cargarTiposUnidadEnSelect(selectId, valorSeleccionado) {
  obtenerTiposUnidad(false) // false = usar caché si existe
    .then(function(tipos) {
      var select = document.getElementById(selectId);
      if (!select) return;

      // Limpiar opciones existentes
      while (select.options.length > 0) {
        select.remove(0);
      }

      // Agregar opción por defecto
      var defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '-- Selecciona tipo de unidad --';
      select.appendChild(defaultOption);

      // Agregar cada tipo
      tipos.forEach(function(tipo) {
        var option = document.createElement('option');
        option.value = tipo;
        option.textContent = tipo;
        if (valorSeleccionado && valorSeleccionado.toUpperCase() === tipo) {
          option.selected = true;
        }
        select.appendChild(option);
      });
    })
    .catch(function(err) {
      console.error('Error al cargar tipos de unidad:', err);
      mostrarToast('⚠️ Error al cargar tipos de unidad', 'error');
    });
}

/**
 * Carga y renderiza la lista de tipos de unidad (usando caché)
 */
function cargarListaTiposUnidad() {
  var container = document.getElementById('lista-tipos-unidad');
  if (!container) return;

  container.innerHTML = '<div class="text-muted small text-center py-3"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</div>';

  obtenerTiposUnidad(false) // false = usar caché
    .then(function(tipos) {
      container.innerHTML = '';
      
      if (!tipos || tipos.length === 0) {
        container.innerHTML = '<div class="text-muted small text-center py-3">No hay tipos registrados.</div>';
        return;
      }

      tipos.forEach(function(tipo) {
        var item = document.createElement('div');
        item.className = 'list-group-item d-flex justify-content-between align-items-center';
        item.innerHTML = `
          <span><strong>${tipo}</strong></span>
          <button class="btn btn-sm btn-outline-danger" onclick="eliminarTipoUnidad('${tipo}')" title="Eliminar tipo">
            <i class="bi bi-trash"></i>
          </button>
        `;
        container.appendChild(item);
      });
    })
    .catch(function(err) {
      container.innerHTML = '<div class="text-danger small text-center py-3">Error al cargar tipos: ' + err.message + '</div>';
    });
}
/**
 * Recarga forzada desde el servidor (limpia caché)
 */
function recargarTiposUnidad() {
  limpiarCacheTiposUnidad();
  cargarListaTiposUnidad();
  mostrarToast('🔄 Recargando tipos de unidad...', 'info');
}
/**
 * Agrega un nuevo tipo de unidad (Admin/Revisor)
 */
function agregarTipoUnidad() {
  var input = document.getElementById('nuevo-tipo-unidad');
  if (!input) return;

  var tipo = input.value.trim();
  if (!tipo) {
    mostrarToast('⚠️ Escribe un tipo de unidad.', 'error');
    return;
  }

  // Validar que no tenga caracteres especiales
  var tipoLimpio = tipo.toUpperCase().replace(/[^A-Z0-9\s]/g, '');
  if (tipoLimpio !== tipo.toUpperCase()) {
    mostrarToast('⚠️ Solo se permiten letras, números y espacios.', 'error');
    return;
  }

  mostrarToast('📋 Agregando tipo...', 'info');
  input.disabled = true;

  google.script.run
    .withSuccessHandler(function(resp) {
      input.disabled = false;
      input.value = '';
      if (resp.ok) {
        // ✅ Limpiar caché y recargar lista
        limpiarCacheTiposUnidad();
        cargarListaTiposUnidad();
        // ✅ Recargar filtro con los nuevos tipos
        cargarTiposUnidadEnFiltro();
        mostrarToast('✅ ' + resp.mensaje, 'success');
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      input.disabled = false;
      console.error('Error al agregar tipo:', err);
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .agregarTipoUnidad(APP.token, tipoLimpio);
}
/**

  if (!tipo) return;

    return;
  }

  mostrarToast('📋 Eliminando tipo...', 'info');

  google.script.run
    .withSuccessHandler(function(resp) {
      if (resp.ok) {
        // ✅ Limpiar caché y recargar lista
        limpiarCacheTiposUnidad();
        cargarListaTiposUnidad();
        // ✅ Recargar filtro después de eliminar
        cargarTiposUnidadEnFiltro();
        mostrarToast('✅ ' + resp.mensaje, 'success');
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      console.error('Error al eliminar tipo:', err);
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .eliminarTipoUnidad(APP.token, tipo);
}

/**
 * Carga los tipos de unidad en el filtro del inventario
 */
function cargarTiposUnidadEnFiltro() {
  var select = document.getElementById('fil-inv-tipo-unidad');
  if (!select) return;

  // Guardar valor seleccionado actual
  var valorActual = select.value;

  // Limpiar opciones existentes (mantener la primera)
  while (select.options.length > 0) {
    select.remove(0);
  }

  // Agregar opción "Todos"
  var defaultOption = document.createElement('option');
  defaultOption.value = '';
  defaultOption.textContent = 'Todos';
  select.appendChild(defaultOption);

  // Cargar tipos desde el servidor
  obtenerTiposUnidad(false)
    .then(function(tipos) {
      tipos.forEach(function(tipo) {
        var option = document.createElement('option');
        option.value = tipo;
        option.textContent = tipo;
        select.appendChild(option);
      });
      
      // Restaurar valor seleccionado
      if (valorActual) {
        select.value = valorActual;
      }
    })
    .catch(function(err) {
      console.error('Error al cargar tipos en filtro:', err);
    });
}

/**
 * Guarda los cambios de un equipo editado
 * @param {string} serie - Serie del equipo
 */
function guardarEdicionEquipo(serie) {
  console.log('💾 guardarEdicionEquipo - Serie:', serie);

  // Obtener valores del formulario
  var tipo = document.getElementById('edit-tipo-equipo').value;
  var modelo = document.getElementById('edit-modelo-equipo').value.trim();
  var imei = document.getElementById('edit-imei-equipo').value.trim();
  var estado = document.getElementById('edit-estado-equipo').value;
  var economico = document.getElementById('edit-economico-equipo').value.trim();
  var observaciones = document.getElementById('edit-observaciones-equipo').value.trim();

  // Validar campos obligatorios
  if (!tipo) {
    mostrarToast('⚠️ El tipo es obligatorio.', 'error');
    return;
  }

  if (!modelo) {
    mostrarToast('⚠️ El modelo es obligatorio.', 'error');
    return;
  }

  if (!estado) {
    mostrarToast('⚠️ El estado es obligatorio.', 'error');
    return;
  }

  // Confirmar cambios
  var mensaje = '¿Confirmas los cambios para el equipo ' + serie + '?\n\n';
  mensaje += '📌 Tipo: ' + tipo + '\n';
  mensaje += '📌 Modelo: ' + modelo + '\n';
  mensaje += '📌 IMEI: ' + (imei || '—') + '\n';
  mensaje += '📌 Estado: ' + estado + '\n';
  mensaje += '📌 Económico: ' + (economico || '—');

  if (!confirm(mensaje)) {
    return;
  }

  mostrarToast('💾 Guardando cambios...', 'info');

  var datos = {
    tipo: tipo,
    modelo: modelo,
    imei: imei,
    estado: estado,
    economico: economico,
    observaciones: observaciones
  };

  google.script.run
    .withSuccessHandler(function(resp) {
      if (resp.ok) {
        mostrarToast('✅ Equipo actualizado correctamente', 'success');
        // Cerrar modal
        var modal = bootstrap.Modal.getInstance(document.getElementById('modalEditarEquipo'));
        if (modal) modal.hide();
        // Recargar inventario
        cargarInventario();
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error al guardar:', err);
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .actualizarEquipoInventario(APP.token, serie, datos);
}
/**
 * Carga el dashboard con estadísticas según el rol (optimizado con Promise.all)
 */
function cargarDashboard() {
  console.log('📊 cargarDashboard - Ejecutando');
  
  var container = document.getElementById('dashboard-content');
  if (!container) return;
  
  container.innerHTML = '<div class="text-center text-muted py-5"><div class="spinner-border" role="status"></div><p class="mt-2">Cargando dashboard...</p></div>';
  
  if (!APP.token) {
    container.innerHTML = '<div class="alert alert-danger">Sesión expirada. Recarga la página.</div>';
    return;
  }
  
  // Fecha actual
  var ahora = new Date();
  document.getElementById('dashboard-fecha').textContent = ahora.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  
  var rol = APP.sesion.rol;
  var esAdminRevisor = rol <= 2;
  var tecnicoId = APP.sesion.usuarioId;
  var sesionActual = APP.sesion;
  
  // ✅ OBTENER DATOS EN PARALELO CON PROMISE.ALL (CON MANEJO DE ERRORES)
  var promesaRegistros = new Promise(function(resolve) {
    google.script.run
      .withSuccessHandler(function(resp) {
        resolve({ ok: true, data: resp });
      })
      .withFailureHandler(function(err) {
        console.warn('⚠️ Error en obtenerRegistros:', err);
        resolve({ ok: false, error: err.message });
      })
      .obtenerRegistros(APP.token, {});
  });
  
  var ticketFiltros = {};
  if (rol === 3) {
    ticketFiltros.tecnico = sesionActual.nombre;
  }
  
  var promesaTickets = new Promise(function(resolve) {
    google.script.run
      .withSuccessHandler(function(resp) {
        resolve({ ok: true, data: resp });
      })
      .withFailureHandler(function(err) {
        console.warn('⚠️ Error en obtenerTickets:', err);
        resolve({ ok: false, error: err.message });
      })
      .obtenerTickets(APP.token, ticketFiltros);
  });
  
  // ✅ EJECUTAR AMBAS LLAMADAS EN PARALELO
  Promise.all([promesaRegistros, promesaTickets])
    .then(function(resultados) {
      console.log('✅ Todas las promesas resueltas');
      
      // ✅ Resultado 1: Registros (con manejo seguro)
      var respRegistros = resultados[0];
      var registros = [];
      if (respRegistros.ok && respRegistros.data && respRegistros.data.ok) {
        registros = respRegistros.data.registros || [];
      } else {
        console.warn('⚠️ No se pudieron cargar los registros:', respRegistros.error);
      }
      
      // ✅ Resultado 2: Tickets (con manejo seguro)
      var respTickets = resultados[1];
      var statsTickets = { pendientes: 0, proceso: 0, resueltos: 0, total: 0 };
      
      if (respTickets && respTickets.ok && respTickets.data && respTickets.data.ok) {
        var tickets = respTickets.data.tickets || [];
        tickets.forEach(function(t) {
          statsTickets.total++;
          if (t.estado === 'Pendiente') statsTickets.pendientes++;
          else if (t.estado === 'En proceso') statsTickets.proceso++;
          else if (t.estado === 'Resuelto') statsTickets.resueltos++;
        });
      } else {
        console.warn('⚠️ No se pudieron cargar los tickets:', respTickets ? respTickets.error : 'Error desconocido');
      }
      
      // ============================================================
      // PROCESAR DATOS Y RENDERIZAR
      // ============================================================
      
      // 1. CALCULAR ESTADÍSTICAS DE REPORTES
      var misRegistros = registros;
      if (!esAdminRevisor) {
        misRegistros = registros.filter(function(r) {
          return r.TECNICO_ID === tecnicoId;
        });
      }
      
      var total = misRegistros.length;
      var pendientes = 0;
      var aprobados = 0;
      var pagados = 0;
      var montoTotal = 0;
      
      var ultimos = misRegistros.slice().sort(function(a, b) {
        return new Date(b.FECHA_REGISTRO || b.FECHA_SERVICIO) - new Date(a.FECHA_REGISTRO || a.FECHA_SERVICIO);
      }).slice(0, 5);
      
      misRegistros.forEach(function(r) {
        var estado = (r.ESTADO || '').toString().toUpperCase().trim();
        var precio = parseFloat(r.PRECIO_UNITARIO || 0);
        if (isNaN(precio)) precio = 0;
        
        if (estado === 'LISTO PARA PAGO') pendientes++;
        else if (estado === 'APROBADO') aprobados++;
        else if (estado === 'PAGADO') {
          pagados++;
          montoTotal += precio;
        }
      });
      
      // 2. ESTADÍSTICAS POR TÉCNICO (solo Admin/Revisor)
      var tecnicosStats = [];
      if (esAdminRevisor) {
        var tecnicosMap = {};
        registros.forEach(function(r) {
          var id = r.TECNICO_ID;
          var nombre = r.TECNICO_NOMBRE || r.NOMBRE_TECNICO || id;
          if (id) {
            if (!tecnicosMap[id]) {
              tecnicosMap[id] = {
                id: id,
                nombre: nombre,
                total: 0,
                pendientes: 0,
                aprobados: 0,
                pagados: 0,
                monto: 0
              };
            }
            var stat = tecnicosMap[id];
            stat.total++;
            var estado = (r.ESTADO || '').toString().toUpperCase().trim();
            var precio = parseFloat(r.PRECIO_UNITARIO || 0);
            if (isNaN(precio)) precio = 0;
            if (estado === 'LISTO PARA PAGO') stat.pendientes++;
            else if (estado === 'APROBADO') stat.aprobados++;
            else if (estado === 'PAGADO') {
              stat.pagados++;
              stat.monto += precio;
            }
          }
        });
        tecnicosStats = Object.values(tecnicosMap).sort(function(a, b) {

      // ============================================================

      // 3.1 Tarjetas de resumen de reportes
      html += `

              </div>

              <div class="card-body p-1">
                <div class="h5 mb-0">${pendientes}</div>
                <small class="text-muted">⏳ Pendientes</small>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-center p-2" style="border-left:4px solid #0d6efd;">
              <div class="card-body p-1">
                <div class="h5 mb-0">${aprobados}</div>
                <small class="text-muted">✅ Aprobados</small>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-center p-2" style="border-left:4px solid #198754;">
              <div class="card-body p-1">
                <div class="h5 mb-0">${pagados}</div>
                <small class="text-muted">💰 Pagados</small>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // 3.2 Monto total y botones de acción
      html += `
        <div class="row g-2 mb-3">
          <div class="col-12 col-md-4">
            <div class="card p-3 text-center" style="background:#f8f9fa;">
              <div style="font-size:12px;color:#6c757d;">Monto total</div>
              <div style="font-size:28px;font-weight:700;color:#198754;">$${montoTotal.toFixed(2)}</div>
            </div>
          </div>
          <div class="col-12 col-md-8">
            <div class="d-flex gap-2 h-100 align-items-center justify-content-center flex-wrap">
              <button class="btn btn-primary btn-lg" onclick="mostrarPanel(document.querySelector('[data-panel=\\'panel-nuevo\\']'))" style="min-width:150px;">
                <i class="bi bi-plus-circle me-2"></i>Nuevo reporte
              </button>
              <button class="btn btn-warning btn-lg" onclick="mostrarPanel(document.querySelector('[data-panel=\\'panel-tickets\\']'))" style="min-width:150px;">
                <i class="bi bi-ticket-perforated me-2"></i>🎫 Tickets
              </button>
              ${esAdminRevisor ? `
                <button class="btn btn-outline-primary btn-lg" onclick="mostrarPanel(document.querySelector('[data-panel=\\'panel-registros\\']'))" style="min-width:150px;">
                  <i class="bi bi-list-check me-2"></i>Revisar pendientes
                </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
      
      // 3.3 Tarjetas de TICKETS
      html += `
        <div class="row g-2 mb-3">
          <div class="col-12">
            <div class="card">
              <div class="card-header bg-warning text-dark py-1">
                <small><i class="bi bi-ticket-perforated me-1"></i>🎫 Tickets</small>
              </div>
              <div class="card-body p-2">
                <div class="row g-1 text-center">
                  <div class="col-4">
                    <div style="font-size:18px;font-weight:700;color:#ffc107;">${statsTickets.pendientes || 0}</div>
                    <div style="font-size:9px;color:#6c757d;">⏳ Pendientes</div>
                  </div>
                  <div class="col-4">
                    <div style="font-size:18px;font-weight:700;color:#0d6efd;">${statsTickets.proceso || 0}</div>
                    <div style="font-size:9px;color:#6c757d;">🔄 En proceso</div>
                  </div>
                  <div class="col-4">
                    <div style="font-size:18px;font-weight:700;color:#198754;">${statsTickets.resueltos || 0}</div>
                    <div style="font-size:9px;color:#6c757d;">✅ Resueltos</div>
                  </div>
                </div>
                <div class="text-center mt-1">
                  <a href="#" onclick="mostrarPanel(document.querySelector('[data-panel=\\'panel-tickets\\']')); return false;" class="small">
                    Ver todos los tickets
                  </a>
                </div>
              </div>
            </div>
          </div>

      `;
      
      // 3.4 Tabla de técnicos (solo Admin/Revisor)
      if (esAdminRevisor && tecnicosStats.length > 0) {
        html += `
          <div class="card mb-3">
            <div class="card-header bg-secondary text-white py-1">

                      <th class="text-center">✅ Aprob.</th>
                      <th class="text-center">💰 Pag.</th>
                      <th class="text-end">Monto</th>
                    </tr>
                  </thead>
                  <tbody>
        `;
        tecnicosStats.forEach(function(t) {
          html += `
            <tr>
              <td><strong>${t.nombre}</strong></td>
              <td class="text-center">${t.total}</td>

      // 3.5 Últimos movimientos
      html += `

          <div class="card-header bg-dark text-white py-1">

          </div>
          <div class="card-body p-0">
      `;
      
      if (ultimos.length === 0) {
        html += `<div class="text-muted small p-3 text-center">No hay movimientos recientes.</div>`;
      } else {
        html += `
          <div class="table-responsive">
            <table class="table table-hover table-sm mb-0" style="font-size:12px;">
              <thead class="table-light">
                <tr>
                  <th>Folio</th>

                  <th>Tipo</th>
                  <th>Precio</th>

        `;
        ultimos.forEach(function(r) {
          var badgeCls = badgeClase(r.ESTADO);

        });
        html += `

            </table>

      }
      
      html += `
          </div>
        </div>
      `;
      
      container.innerHTML = html;
      console.log('✅ Dashboard renderizado correctamente');
      
    })

/**
 * Carga los tickets con filtros (optimizado)
 */
function cargarTickets() {
  console.log('🎫 cargarTickets - Ejecutando');
  
  var tbody = document.getElementById('tickets-body');
  if (!tbody) {
    console.warn('⚠️ No se encontró tickets-body');
    return;
  }
  
  // ✅ Mostrar estado de carga con spinner
  tbody.innerHTML = `
    <tr>
      <td colspan="7" class="text-center text-muted py-4">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        Cargando tickets...
      </td>
    </tr>
  `;
  
  if (!APP.token) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-3">Sesión expirada. Recarga la página.</td></tr>';
    return;
  }
  
  // ✅ Obtener filtros
  var filtros = {
    estado: document.getElementById('fil-ticket-estado')?.value || '',
    unidad: document.getElementById('fil-ticket-unidad')?.value || '',
    tecnico: document.getElementById('fil-ticket-tecnico')?.value || ''
  };
  
  console.log('📌 Filtros:', filtros);
  
  google.script.run
    .withSuccessHandler(function(resp) {
      console.log('✅ Respuesta de obtenerTickets:', resp);
      
      // ✅ VERIFICAR QUE LA RESPUESTA SEA VÁLIDA
      if (!resp) {
        console.error('❌ Respuesta null o undefined');
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-danger py-3">
              Error: No se recibió respuesta del servidor. Verifica que la función "obtenerTickets" exista en Code.gs.
            </td>
          </tr>
        `;
        mostrarToast('❌ Error: No se recibió respuesta del servidor.', 'error');
        return;
      }
      
      if (!resp.ok) {
        console.error('❌ Error en respuesta:', resp.error);
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-danger py-3">
              Error: ${resp.error || 'Error desconocido'}
            </td>
          </tr>
        `;
        mostrarToast('❌ Error: ' + (resp.error || 'Error desconocido'), 'error');
        return;
      }
      
      var tickets = resp.tickets || [];
      console.log('📋 Tickets recibidos:', tickets.length);
      
      // ✅ Actualizar resumen de estados
      var pendientes = 0, proceso = 0, resueltos = 0;
      tickets.forEach(function(t) {
        if (t.estado === 'Pendiente') pendientes++;
        else if (t.estado === 'En proceso') proceso++;
        else if (t.estado === 'Resuelto') resueltos++;
      });
      
      document.getElementById('tickets-pendientes').textContent = pendientes;
      document.getElementById('tickets-proceso').textContent = proceso;
      document.getElementById('tickets-resueltos').textContent = resueltos;
      document.getElementById('tickets-total').textContent = tickets.length;
      document.getElementById('tickets-total-text').textContent = 'Total: ' + tickets.length + ' tickets';
      
      // ✅ Si no hay tickets, mostrar mensaje
      if (tickets.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-muted py-4">
              <i class="bi bi-inbox" style="font-size:24px;display:block;margin-bottom:8px;"></i>
              No hay tickets con los filtros seleccionados.
            </td>
          </tr>
        `;
        return;
      }
      
      // ✅ Renderizar tickets
      tbody.innerHTML = '';
      var rol = APP.sesion ? APP.sesion.rol : 3;
      var tecnicoActual = APP.sesion ? APP.sesion.usuarioId : '';
      var esAdminRevisor = rol <= 2;
      
      tickets.forEach(function(t, index) {
        var badgeCls = 'badge ';
        if (t.estado === 'Pendiente') badgeCls += 'bg-warning text-dark';
        else if (t.estado === 'En proceso') badgeCls += 'bg-primary';
        else if (t.estado === 'Resuelto') badgeCls += 'bg-success';
        else badgeCls += 'bg-secondary';
        
        var acciones = '';
        acciones += `
          <button class="btn btn-sm btn-outline-primary" onclick="verDetalleTicket('${t.id}')" title="Ver detalle">
            <i class="bi bi-eye"></i>
          </button>
        `;
        
        if (t.estado === 'Pendiente') {
          acciones += `
            <button class="btn btn-sm btn-primary" onclick="tomarTicket('${t.id}')" title="Tomar ticket">
              <i class="bi bi-hand-thumbs-up"></i>
            </button>
          `;
        }
        
        if (t.estado === 'En proceso' && (t.tecnicoAsignado === tecnicoActual || esAdminRevisor)) {
          acciones += `
            <button class="btn btn-sm btn-success" onclick="mostrarResolverTicket('${t.id}')" title="Resolver ticket">
              <i class="bi bi-check2"></i>
            </button>
          `;
        }
        
        var tr = document.createElement('tr');
        tr.innerHTML = `
          <td><code style="font-size:12px;">${t.id}</code></td>
          <td style="font-size:13px;">${t.fecha}</td>
          <td><strong>${t.unidad}</strong></td>
          <td style="font-size:13px;">${t.descripcion.substring(0, 60)}${t.descripcion.length > 60 ? '...' : ''}</td>
          <td><span class="${badgeCls}" style="font-size:11px;padding:4px 10px;">${t.estado}</span></td>
          <td style="font-size:13px;">${t.tecnicoNombre || '—'}</td>
          <td>
            <div class="d-flex gap-1 flex-wrap">${acciones}</div>
          </td>
        `;
        tbody.appendChild(tr);
      });
      
      console.log('✅ Tickets renderizados:', tickets.length);
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error en cargarTickets:', err);
      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="text-center text-danger py-3">
            <i class="bi bi-bug me-1"></i>
            Error: ${err.message || 'Error de conexión'}
          </td>
        </tr>
      `;
      mostrarToast('❌ Error al cargar tickets: ' + err.message, 'error');
    })
    .obtenerTickets(APP.token, filtros);
}

/**
 * Crea un nuevo ticket
 */
function crearTicket() {
  var unidad = document.getElementById('ticket-unidad').value;
  var descripcion = document.getElementById('ticket-descripcion').value.trim();
  
  if (!unidad) {
    mostrarToast('⚠️ Debes seleccionar una unidad.', 'error');
    return;
  }
  
  if (!descripcion || descripcion.length < 10) {
    mostrarToast('⚠️ La descripción debe tener al menos 10 caracteres.', 'error');
    document.getElementById('ticket-descripcion').focus();
    return;
  }
  
  mostrarToast('🎫 Creando ticket...', 'info');
  document.querySelector('#modalNuevoTicket .btn-primary').disabled = true;
  
  google.script.run
    .withSuccessHandler(function(resp) {
      document.querySelector('#modalNuevoTicket .btn-primary').disabled = false;
      if (resp.ok) {
        mostrarToast('✅ Ticket ' + resp.id + ' creado correctamente.', 'success');
        var modal = bootstrap.Modal.getInstance(document.getElementById('modalNuevoTicket'));

        cargarTickets();

      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .crearTicket(APP.token, { unidad: unidad, descripcion: descripcion });

            <p><code>${ticket.id}</code></p></div>

            <p>${ticket.creadoPorNombre || ticket.creadoPor}</p></div>
          <div class="col-6"><label class="form-label small text-muted">Técnico asignado</label>
            <p>${ticket.tecnicoNombre || '—'}</p></div>
          <div class="col-12"><label class="form-label small text-muted">Descripción</label>

          ${ticket.comentarios ? `
            <div class="col-12"><label class="form-label small text-muted">Comentarios</label>

window._tiposUnidadTemp = [];

window._estadosTemp = [];
/**
 * Muestra el formulario para agregar un nuevo vehículo

 */
function mostrarFormAgregarVehiculo() {

  window._tiposVehiculoTemp = [];
  window._estadosTemp = [];

  var respuestasRecibidas = 0;
  var totalRespuestas = 3;

  // Función para verificar completado
  function verificarCompletado() {
    respuestasRecibidas++;

    if (respuestasRecibidas >= totalRespuestas) {

      if (!window._tiposUnidadTemp || window._tiposUnidadTemp.length === 0) {
        console.warn('⚠️ Tipos de unidad no cargados, usando valores por defecto');
        window._tiposUnidadTemp = ['UNIDAD', 'UTILITARIA', 'CAJA SECA', 'MÓVIL', 'DOLLY', 'REMOLQUE'];
      }
      
      if (!window._tiposVehiculoTemp || window._tiposVehiculoTemp.length === 0) {
        console.warn('⚠️ Tipos de vehículo no cargados, usando valores por defecto');
        window._tiposVehiculoTemp = ['UTILITARIA', 'CAMION', 'VAN', 'PICKUP', 'AUTOMOVIL', 'TRACTOCAMION', 'REMOLQUE'];
      }
      
      if (!window._estadosTemp || window._estadosTemp.length === 0) {
        console.warn('⚠️ Estados no cargados, usando valores por defecto');
        window._estadosTemp = [
          { id: '1', nombre: 'Activo', color: 'success', activo: true },
          { id: '2', nombre: 'Inactivo', color: 'danger', activo: true },
          { id: '3', nombre: 'En Mantenimiento', color: 'warning', activo: true },
          { id: '4', nombre: 'Siniestrada', color: 'dark', activo: true }
        ];
      }
      
      // Renderizar el modal con todos los datos
      renderizarModal();
    }
  }

  // 1. OBTENER TIPOS DE UNIDAD
  if (typeof obtenerTiposUnidad === 'function') {
    google.script.run
      .withSuccessHandler(function(resp) {
        console.log('✅ Tipos de unidad recibidos:', resp);
        if (resp && resp.ok && resp.tipos) {
          window._tiposUnidadTemp = resp.tipos;
        } else if (Array.isArray(resp)) {
          window._tiposUnidadTemp = resp;
        } else {
          window._tiposUnidadTemp = ['UNIDAD', 'UTILITARIA', 'CAJA SECA', 'MÓVIL', 'DOLLY', 'REMOLQUE'];
        }
        verificarCompletado();
      })
      .withFailureHandler(function(err) {
        console.error('❌ Error al obtener tipos de unidad:', err);
        window._tiposUnidadTemp = ['UNIDAD', 'UTILITARIA', 'CAJA SECA', 'MÓVIL', 'DOLLY', 'REMOLQUE'];
        verificarCompletado();
      })
      .obtenerTiposUnidad(APP.token);
  } else {
    console.warn('⚠️ Función obtenerTiposUnidad no disponible, usando valores por defecto');
    window._tiposUnidadTemp = ['UNIDAD', 'UTILITARIA', 'CAJA SECA', 'MÓVIL', 'DOLLY', 'REMOLQUE'];
    verificarCompletado();
  }

  // 2. OBTENER TIPOS DE VEHÍCULO

    .withSuccessHandler(function(resp) {

      if (resp && resp.ok && resp.tipos) {
        window._tiposVehiculoTemp = resp.tipos;
      } else if (Array.isArray(resp)) {

      window._tiposVehiculoTemp = ['UTILITARIA', 'CAMION', 'VAN', 'PICKUP', 'AUTOMOVIL', 'TRACTOCAMION', 'REMOLQUE'];
      verificarCompletado();
    })
    .obtenerTiposVehiculo(APP.token);

  // 3. OBTENER ESTADOS DEL CATÁLOGO
  google.script.run
    .withSuccessHandler(function(resp) {
      console.log('✅ Estados recibidos:', resp);
      if (resp && resp.ok && resp.estados) {
        window._estadosTemp = resp.estados;
      } else if (Array.isArray(resp) && resp.length > 0) {
        if (typeof resp[0] === 'object') {
          window._estadosTemp = resp;

/**
 * Renderiza estados con selección
 */
function renderEstadosEnSelector(selectorId, estados, estadoSeleccionado) {
  var selector = document.getElementById(selectorId);
  if (!selector) return;
  
  selector.innerHTML = '<option value="">Selecciona un estado...</option>';
  
  estados.forEach(function(estado) {
    if (estado.activo === false) return;
    var option = document.createElement('option');
    option.value = estado.id;
    option.textContent = estado.nombre;
    if (estado.color) {
      option.style.borderLeft = '4px solid var(--bs-' + estado.color + ')';
      option.style.paddingLeft = '8px';
    }
    if (estadoSeleccionado && estado.id === estadoSeleccionado.toString()) {
      option.selected = true;
    }
    selector.appendChild(option);
  });
}

/**

 */
function guardarVehiculoFlotilla() {
  console.log('🚚 Guardando vehículo...');
  
  // Recopilar datos del formulario
  var datos = {
    economico: document.getElementById('modal-vehiculo-economico').value.trim(),
    placas: document.getElementById('modal-vehiculo-placas').value.trim(),
    tipoVehiculo: document.getElementById('modal-vehiculo-tipo').value,

    estado: document.getElementById('modal-vehiculo-estado').value,
    serieVehiculo: document.getElementById('modal-vehiculo-serie').value.trim()
  };
  
  // Validar campos obligatorios

    mostrarToast('⚠️ El campo Económico es obligatorio', 'warning');
    document.getElementById('modal-vehiculo-economico').focus();

  // Mostrar loading

    .withFailureHandler(function(err) {
      console.error('❌ Error al guardar:', err);

/**
 * Carga la flotilla desde el backend, mapea los estados del catálogo
 * y muestra el número de serie real del GPS
 */
function cargarFlotilla() {
  console.log('🚚 cargarFlotilla - Ejecutando...');
  
  if (!APP.token) {
    console.log('⏳ Esperando token...');
    setTimeout(cargarFlotilla, 500);
    return;
  }
  
  var tbody = document.getElementById('flotilla-body');
  if (!tbody) {
    console.error('❌ No se encontró el elemento flotilla-body');
    return;
  }
  
  // Mostrar estado de carga
  tbody.innerHTML = `
    <tr>
      <td colspan="10" class="text-center text-muted py-3">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        Cargando flotilla...
      </td>
    </tr>
  `;
  
  // 1. OBTENER ESTADOS PRIMERO (para mapear)
  google.script.run
    .withSuccessHandler(function(estados) {
      console.log('✅ Estados cargados:', estados.length);
      
      // Guardar en caché global
      _estadosVehiculoCache = {
        estados: estados,
        timestamp: Date.now()
      };
      
      // 2. OBTENER FLOTILLA
      google.script.run
        .withSuccessHandler(function(resp) {
          console.log('✅ Flotilla recibida:', resp);
          
          if (!resp.ok) {
            tbody.innerHTML = `
              <tr>
                <td colspan="10" class="text-center text-danger py-3">
                  <i class="bi bi-exclamation-triangle me-2"></i>
                  ${resp.error || 'Error al cargar flotilla'}
                </td>
              </tr>
            `;
            return;
          }
          
          if (!resp.vehiculos || resp.vehiculos.length === 0) {
            tbody.innerHTML = `
              <tr>
                <td colspan="10" class="text-center text-muted py-3">
                  <i class="bi bi-inbox me-2"></i>
                  No hay vehículos registrados
                </td>
              </tr>
            `;
            actualizarResumenFlotilla([]);
            return;
          }
          
          // 3. RENDERIZAR VEHÍCULOS CON ESTADOS MAPEADOS
          var html = '';
          resp.vehiculos.forEach(function(v) {
            // Buscar el estado en el catálogo por ID
            var estadoObj = estados.find(function(e) { 
              return e.id === v.estadoId; 
            });
            
            var estadoNombre = estadoObj ? estadoObj.nombre : 'Sin estado';
            var estadoColor = estadoObj ? estadoObj.color : 'secondary';
            var badgeClass = 'badge bg-' + estadoColor;
            
            // OBTENER EL GPS REAL de la columna GPS_ACTUAL
            var gpsActual = v.gateway || v.gpsActual || '—';
            
            html += `
              <tr>
                <td><strong>${v.economico || '-'}</strong></td>
                <td>${v.placas || '-'}</td>
                <td>${v.tipoVehiculo || '-'}</td>
                <td>${(v.marca || '')} ${(v.modelo || '')}</td>
                <td><span class="${badgeClass}">${estadoNombre}</span></td>
                <td>${v.tipoUnidad || '-'}</td>
                <td>${gpsActual}</td>
                <td>${v.camara || '-'}</td>
                <td>${v.accesorios || '-'}</td>
                <td>
                  <div class="btn-group btn-group-sm" role="group">
                    <button class="btn btn-outline-primary" 
                            onclick="mostrarFormEditarVehiculo('${v.economico}')"
                            title="Editar vehículo">
                      <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-outline-secondary" 
                            onclick="abrirModalEstado('${v.economico}')"
                            title="Cambiar estado">
                      <i class="bi bi-tag"></i>
                    </button>
                  </div>
                </td>
              </tr>
            `;
          });
          
          tbody.innerHTML = html;
          console.log('✅ Flotilla renderizada: ' + resp.vehiculos.length + ' vehículos');
          
          // Actualizar resumen
          actualizarResumenFlotilla(resp.vehiculos);
          
        })
        .withFailureHandler(function(err) {
          console.error('❌ Error al cargar flotilla:', err);
          tbody.innerHTML = `
            <tr>
              <td colspan="10" class="text-center text-danger py-3">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Error: ${err.message}
              </td>
            </tr>
          `;
          mostrarToast('Error al cargar flotilla: ' + err.message, 'danger');
        })
        .obtenerFlotilla();
        
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error al cargar estados:', err);
      // Fallback: cargar flotilla sin estados
      cargarFlotillaSinEstados();
    })
    .obtenerEstadosVehiculo();
}

/**
 * Carga los tipos de unidad en el filtro de flotilla
 */
function cargarTiposUnidadEnFiltroFlotilla() {
  var select = document.getElementById('fil-flotilla-tipo-unidad');
  if (!select) return;
  
  var valorActual = select.value;
  while (select.options.length > 0) select.remove(0);
  
  var defaultOption = document.createElement('option');
  defaultOption.value = '';
  defaultOption.textContent = 'Todos';
  select.appendChild(defaultOption);
  
  obtenerTiposUnidad(false)
    .then(function(tipos) {
      tipos.forEach(function(tipo) {
        var option = document.createElement('option');
        option.value = tipo;
        option.textContent = tipo;
        select.appendChild(option);
      });
      if (valorActual) select.value = valorActual;
    })
    .catch(function(err) {
      console.error('Error al cargar tipos en filtro flotilla:', err);
    });
}

  document.getElementById('fil-flotilla-estado').value = '';
  document.getElementById('fil-flotilla-tipo-unidad').value = '';

/**
 * Abre el formulario para editar un vehículo
 * @param {string} economico - ID del vehículo
 */
function editarVehiculo(economico) {
  if (!economico) {
    mostrarToast('⚠️ No se especificó un vehículo.', 'error');
    return;
  }

  // Verificar permisos
  if (!APP.sesion || APP.sesion.rol > 2) {
    mostrarToast('⚠️ No tienes permisos para editar vehículos.', 'error');
    return;
  }

  mostrarToast('📋 Cargando datos de ' + economico + '...', 'info');

  // Obtener todos los vehículos y buscar el específico
  google.script.run
    .withSuccessHandler(function(resp) {
      console.log('✅ Respuesta de obtenerFlotillaCompleta (editar):', resp);
      
      if (!resp.ok || !resp.vehiculos) {
        mostrarToast('❌ Error al cargar datos', 'error');
        return;
      }
      
      var vehiculo = resp.vehiculos.find(function(v) {
        return v.economico === economico;
      });
      
      if (!vehiculo) {
        mostrarToast('❌ No se encontró el vehículo ' + economico, 'error');
        return;
      }
      
      // Obtener tipos de unidad, tipos de vehículo y estados
      var promesaTiposUnidad = obtenerTiposUnidad(false);
      var promesaTiposVehiculo = new Promise(function(resolve) {
        google.script.run
          .withSuccessHandler(function(resp) {
            resolve(resp.ok ? resp.tipos : ['Camión', 'Pickup', 'Van', 'Otro']);
          })
          .withFailureHandler(function() {
            resolve(['Camión', 'Pickup', 'Van', 'Otro']);
          })
          .obtenerTiposVehiculo(APP.token);
      });
      var promesaEstados = new Promise(function(resolve) {
        google.script.run
          .withSuccessHandler(function(resp) {
            resolve(resp.ok ? resp.estados : ['Activo', 'Inactivo']);
          })
          .withFailureHandler(function() {
            resolve(['Activo', 'Inactivo']);
          })
          .obtenerEstadosVehiculo(APP.token);
      });

      Promise.all([promesaTiposUnidad, promesaTiposVehiculo, promesaEstados])
        .then(function(resultados) {
          var tiposUnidad = resultados[0] || [];
          var tiposVehiculo = resultados[1] || ['Camión', 'Pickup', 'Van', 'Otro'];
          var estados = resultados[2] || ['Activo', 'Inactivo'];

          var modalHtml = `
            <div class="modal fade" id="modalEditarVehiculo" tabindex="-1">
              <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title">✏️ Editar vehículo - ${vehiculo.economico}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body">
                    <div class="alert alert-info small">
                      <i class="bi bi-info-circle me-1"></i>
                      Los campos marcados con <span class="text-danger">*</span> son obligatorios.
                    </div>

                    <div class="row g-3">
                      <div class="col-md-4">
                        <label class="form-label">Económico <span class="text-danger">*</span></label>
                        <input type="text" id="edit-veh-economico" class="form-control" value="${vehiculo.economico}" readonly style="background:#f1f5f9;">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Placas <span class="text-danger">*</span></label>
                        <input type="text" id="edit-veh-placas" class="form-control" value="${vehiculo.placas || ''}">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Tipo de vehículo <span class="text-danger">*</span></label>
                        <select id="edit-veh-tipo" class="form-select">
                          <option value="">-- Selecciona --</option>
                          ${tiposVehiculo.map(function(t) {
                            return `<option value="${t}" ${vehiculo.tipoVehiculo === t ? 'selected' : ''}>${t}</option>`;
                          }).join('')}
                        </select>
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Marca</label>
                        <input type="text" id="edit-veh-marca" class="form-control" value="${vehiculo.marca || ''}">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Modelo</label>
                        <input type="text" id="edit-veh-modelo" class="form-control" value="${vehiculo.modelo || ''}">
                      </div>
                      <div class="col-md-4">
                        <label class="form-label">Año</label>
                        <input type="number" id="edit-veh-anio" class="form-control" value="${vehiculo.anio || ''}" min="1990" max="2030">
                      </div>
                      <div class="col-md-6">
                        <label class="form-label">Estado <span class="text-danger">*</span></label>
                        <select id="edit-veh-estado" class="form-select">
                          ${estados.map(function(e) {
                            return `<option value="${e}" ${vehiculo.estado.nombre === e || vehiculo.estado === e ? 'selected' : ''}>${e}</option>`;
                          }).join('')}
                        </select>
                      </div>
                      <div class="col-md-6">
                        <label class="form-label">Tipo de unidad</label>
                        <select id="edit-veh-tipo-unidad" class="form-select">
                          <option value="">-- Selecciona --</option>
                          ${tiposUnidad.map(function(t) {
                            return `<option value="${t}" ${vehiculo.tipoUnidad === t ? 'selected' : ''}>${t}</option>`;
                          }).join('')}
                        </select>
                      </div>
                    </div>
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="guardarEdicionVehiculo('${vehiculo.economico}')">
                      <i class="bi bi-save me-1"></i>Guardar cambios
                    </button>
                  </div>
                </div>
              </div>
            </div>
          `;

          var modalExistente = document.getElementById('modalEditarVehiculo');
          if (modalExistente) modalExistente.remove();

          var div = document.createElement('div');
          div.innerHTML = modalHtml;
          document.body.appendChild(div);

          var modal = new bootstrap.Modal(document.getElementById('modalEditarVehiculo'));
          modal.show();
        })
        .catch(function(err) {
          console.error('Error al cargar datos:', err);
          mostrarToast('❌ Error al cargar el formulario: ' + err.message, 'error');
        });
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error:', err);
      mostrarToast('❌ Error al cargar datos: ' + err.message, 'error');
    })
    .obtenerFlotillaCompleta(APP.token, {});
}
/**
 * Guarda los cambios de un vehículo editado
 * @param {string} economico - ID del vehículo
 */
function guardarEdicionVehiculo(economico) {
  console.log('💾 guardarEdicionVehiculo - economico:', economico);
  
  // Obtener valores del formulario
  var placas = document.getElementById('edit-veh-placas').value.trim();
  var tipoVehiculo = document.getElementById('edit-veh-tipo').value;
  var marca = document.getElementById('edit-veh-marca').value.trim();
  var modelo = document.getElementById('edit-veh-modelo').value.trim();
  var anio = document.getElementById('edit-veh-anio').value.trim();
  var estado = document.getElementById('edit-veh-estado').value;
  var tipoUnidad = document.getElementById('edit-veh-tipo-unidad').value;

  // Validar campos obligatorios
  if (!placas) {
    mostrarToast('⚠️ El campo "Placas" es obligatorio.', 'error');
    document.getElementById('edit-veh-placas').focus();
    return;
  }

  if (!tipoVehiculo) {
    mostrarToast('⚠️ El campo "Tipo de vehículo" es obligatorio.', 'error');
    document.getElementById('edit-veh-tipo').focus();
    return;
  }

  if (!estado) {
    mostrarToast('⚠️ El campo "Estado" es obligatorio.', 'error');
    document.getElementById('edit-veh-estado').focus();
    return;
  }

  // Confirmar
  var mensaje = '¿Confirmas los cambios para el vehículo ' + economico + '?\n\n';
  mensaje += '📌 Placas: ' + placas + '\n';
  mensaje += '📌 Tipo: ' + tipoVehiculo + '\n';
  mensaje += '📌 Estado: ' + estado + '\n';
  if (tipoUnidad) mensaje += '📌 Tipo Unidad: ' + tipoUnidad;

  if (!confirm(mensaje)) {
    return;
  }

  mostrarToast('💾 Guardando cambios...', 'info');
  document.querySelector('#modalEditarVehiculo .btn-primary').disabled = true;

  var datos = {
    placas: placas,
    tipoVehiculo: tipoVehiculo,
    marca: marca,
    modelo: modelo,
    anio: anio,
    estado: estado,
    tipoUnidad: tipoUnidad
  };

  google.script.run
    .withSuccessHandler(function(resp) {
      document.querySelector('#modalEditarVehiculo .btn-primary').disabled = false;
      if (resp.ok) {
        mostrarToast('✅ Vehículo ' + economico + ' actualizado correctamente.', 'success');
        var modal = bootstrap.Modal.getInstance(document.getElementById('modalEditarVehiculo'));
        if (modal) modal.hide();
        cargarFlotilla();
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      document.querySelector('#modalEditarVehiculo .btn-primary').disabled = false;
      console.error('Error al guardar:', err);
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .actualizarVehiculoCatalogo(APP.token, economico, datos);
}

/**
 * Verifica si un vehículo tiene equipos instalados antes de permitir instalación
 * @param {string} economico - ID del vehículo
 * @returns {Promise} - Resuelve con { tieneEquipos, gateway, camara }
 */
function verificarEquiposVehiculo(economico) {
  return new Promise(function(resolve, reject) {
    if (!economico || economico.trim() === '') {
      resolve({ tieneEquipos: false, gateway: null, camara: null });
      return;
    }

    if (!APP.token) {
      reject(new Error('Sesión expirada. Recarga la página.'));
      return;
    }

    google.script.run
      .withSuccessHandler(function(resp) {
        resolve(resp);
      })
      .withFailureHandler(function(err) {
        reject(err);
      })
      .verificarEquiposVehiculoBackend(APP.token, economico);
  });
}
function cargarEstadosVehiculo() {
  google.script.run
    .withSuccessHandler(function(resp) {
      if (resp.ok) {
        var select = document.getElementById('edit-estado-vehiculo');
        select.innerHTML = ''; // Limpiar opciones actuales
        resp.estados.forEach(function(estado) {
          var option = document.createElement('option');
          option.value = estado.nombre;
          option.textContent = estado.nombre;
          // Opcional: Asignar color al texto
          option.style.color = estado.color;
          select.appendChild(option);
        });
      }
    })
    .obtenerEstadosVehiculo(APP.token);
}
// En cargarFlotilla(), buscar el color del estado
function obtenerColorEstado(estadoNombre, coloresMap) {
  return coloresMap[estadoNombre] || 'secondary';
}

// Uso:
var color = obtenerColorEstado(v.estado, coloresMap);
var badgeEstado = 'badge bg-' + color;

/**
 * Carga los estados de vehículos desde el backend
 */
function cargarEstadosVehiculo(selectorId) {
  console.log('📋 Cargando estados de vehículo...');
  
  if (!APP.token) {
    setTimeout(function() { cargarEstadosVehiculo(selectorId); }, 500);
    return;
  }
  
  // Usar caché si existe (5 minutos)
  if (_estadosVehiculoCache && (Date.now() - _estadosVehiculoCache.timestamp < 300000)) {
    console.log('📋 Usando estados en caché');
    renderEstadosEnSelector(selectorId, _estadosVehiculoCache.estados);
    return;
  }
  
  google.script.run
    .withSuccessHandler(function(estados) {
      console.log('✅ Estados cargados:', estados);
      _estadosVehiculoCache = {
        estados: estados,
        timestamp: Date.now()
      };
      renderEstadosEnSelector(selectorId, estados);
    })
    .withFailureHandler(function(error) {
      console.error('❌ Error al cargar estados:', error);
      mostrarToast('Error al cargar estados de vehículos', 'danger');
    })
    .obtenerEstadosVehiculo();
}
/**
 * Renderiza los estados en un selector
 */
function renderEstadosEnSelector(selectorId, estados) {
  var selector = document.getElementById(selectorId);
  if (!selector) {
    console.warn('⚠️ Selector no encontrado:', selectorId);
    return;
  }
  
  selector.innerHTML = '<option value="">Selecciona un estado...</option>';
  
  estados.forEach(function(estado) {
    if (estado.activo === false) return;
    var option = document.createElement('option');
    option.value = estado.id;
    option.textContent = estado.nombre;
    if (estado.color) {
      option.style.borderLeft = '4px solid var(--bs-' + estado.color + ')';
      option.style.paddingLeft = '8px';
    }
    selector.appendChild(option);
  });
  
  console.log('✅ Selector cargado con ' + estados.length + ' estados');
}

// Guardamos la función original por si la necesitamos
var _cargarFlotillaOriginal = cargarFlotilla;

// Sobreescribimos la función
cargarFlotilla = function() {
  console.log('🚚 Cargando flotilla con estados...');
  
  if (!APP.token) {
    setTimeout(cargarFlotilla, 500);
    return;
  }
  
  var tbody = document.getElementById('flotilla-body');
  if (!tbody) return;
  
  tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-3">' +
    '<div class="spinner-border spinner-border-sm me-2" role="status"></div>Cargando vehículos...</td></tr>';
  
  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-danger py-3">' +
          '<i class="bi bi-exclamation-triangle me-2"></i>' + (resp.error || 'Error al cargar flotilla') +
          '</td></tr>';
        return;
      }
      
      if (resp.vehiculos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-3">' +
          '<i class="bi bi-inbox me-2"></i>No hay vehículos registrados</td></tr>';
        return;
      }
      
      // Construir filas
      var html = '';
      resp.vehiculos.forEach(function(v) {
        // Crear badge de estado con color
        var badgeClass = 'badge bg-' + (v.estadoColor || 'secondary');
        var estadoDisplay = v.estadoNombre || 'Sin estado';
        
        html += '<tr>' +
          '<td><strong>' + (v.economico || '-') + '</strong></td>' +
          '<td>' + (v.placas || '-') + '</td>' +
          '<td>' + (v.tipoVehiculo || '-') + '</td>' +
          '<td>' + (v.marca || '') + ' ' + (v.modelo || '') + '</td>' +
          '<td><span class="' + badgeClass + '">' + estadoDisplay + '</span></td>' +
          '<td>' + (v.tipoUnidad || '-') + '</td>' +
          '<td>' + (v.gateway || '-') + '</td>' +
          '<td>' + (v.camara || '-') + '</td>' +
          '<td>' + (v.accesorios || '-') + '</td>' +
          '<td>' +
            '<button class="btn btn-sm btn-outline-primary" onclick="abrirModalEstado(\'' + v.economico + '\')" title="Cambiar estado">' +
              '<i class="bi bi-pencil"></i>' +
            '</button>' +
          '</td>' +
        '</tr>';
      });
      
      tbody.innerHTML = html;
      console.log('✅ Flotilla cargada: ' + resp.vehiculos.length + ' vehículos');
      
      // Actualizar resumen
      actualizarResumenFlotilla(resp.vehiculos);
    })
    .withFailureHandler(function(err) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-center text-danger py-3">' +
        'Error: ' + err.message + '</td></tr>';
      console.error('❌ Error al cargar flotilla:', err);
    })
    .obtenerFlotilla();
};
/**
 * Actualiza los resúmenes de la flotilla
 */
function actualizarResumenFlotilla(vehiculos) {
  try {
    var total = vehiculos.length;
    var activos = vehiculos.filter(function(v) { 
      return v.estadoNombre === 'Activo' || v.estadoId === '1'; 
    }).length;
    var inactivos = vehiculos.filter(function(v) { 
      return v.estadoNombre === 'Inactivo' || v.estadoId === '2'; 
    }).length;
    var conEquipos = vehiculos.filter(function(v) { 
      var gps = v.gateway || v.gpsActual || '';
      return gps !== '' && gps !== '-' && gps !== 'Sin GPS' && gps !== 'Pendiente'; 
    }).length;
    var sinEquipos = total - conEquipos;
    
    document.getElementById('flotilla-total').textContent = total;
    document.getElementById('flotilla-activos').textContent = activos;
    document.getElementById('flotilla-inactivos').textContent = inactivos;
    document.getElementById('flotilla-con-equipos').textContent = conEquipos;
    document.getElementById('flotilla-sin-equipos').textContent = sinEquipos;
    document.getElementById('flotilla-total-text').textContent = 'Total: ' + total + ' vehículos';
  } catch (e) {
    console.warn('⚠️ Error al actualizar resumen:', e);
  }
}

                  <label class="form-label required">Placas</label>
                  <input type="text" id="modal-vehiculo-placas" class="form-control" placeholder="Ej: ABC-123-X" required>
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Tipo de Vehículo</label>
                  <select id="modal-vehiculo-tipo" class="form-select">
                    <option value="">Seleccionar...</option>
                    ${tiposVehiculo.map(function(t) {
                      return `<option value="${t}">${t}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Marca</label>
                  <input type="text" id="modal-vehiculo-marca" class="form-control" placeholder="Ej: Ford">
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Modelo</label>
                  <input type="text" id="modal-vehiculo-modelo" class="form-control" placeholder="Ej: F-350">
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Año</label>
                  <input type="number" id="modal-vehiculo-ano" class="form-control" placeholder="2024" min="1990" max="2025">
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Tipo de Unidad</label>
                  <select id="modal-vehiculo-tipo-unidad" class="form-select">
                    <option value="">Seleccionar...</option>
                    ${tiposUnidad.map(function(t) {
                      return `<option value="${t}">${t}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label required">Estado</label>
                  <select id="modal-vehiculo-estado" class="form-select" required>
                    <option value="">Seleccionar estado...</option>
                    ${estados.map(function(e) {
                      var id = e.id || e;
                      var nombre = e.nombre || e;
                      var selected = nombre === 'Activo' ? 'selected' : '';
                      var style = e.color ? `style="border-left: 4px solid var(--bs-${e.color}); padding-left: 8px;"` : '';
                      return `<option value="${id}" ${selected} ${style}>${nombre}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Serie del Vehículo (VIN)</label>
                  <input type="text" id="modal-vehiculo-serie" class="form-control" placeholder="Ej: 1FT8W3BT9PED12345" oninput="this.value=this.value.toUpperCase()">
                </div>
                <input type="hidden" id="modal-vehiculo-editando" value="false">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x me-1"></i>Cancelar
            </button>
            <button type="button" class="btn btn-primary" onclick="guardarVehiculoFlotilla()">
              <i class="bi bi-check me-1"></i>Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
  
  // Remover modal anterior si existe
  var modalExistente = document.getElementById('modal-vehiculo-flotilla');
  if (modalExistente) modalExistente.remove();
  
  // Agregar modal al DOM
  var div = document.createElement('div');
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
  
  console.log('✅ Modal de vehículo renderizado correctamente');
}
</script>
