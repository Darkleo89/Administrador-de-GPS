/**
 * Valida la serie GPS en el inventario y autocompleta el tipo de equipo
 * @param {string} serie - Serie del GPS a validar
 * @param {string} tipoEquipo - 'gateway' o 'camara'
 */
function validarYAutocompletarTipo(serie, tipoEquipo) {
  console.log('🔍 validarYAutocompletarTipo - Serie:', serie, 'Tipo:', tipoEquipo);
  
  // Si la serie está vacía o es muy corta, limpiar
  if (!serie || serie.length < 5) {
    var validacion = document.getElementById('serie-validacion');
    if (validacion) {
      validacion.innerHTML = '';
      validacion.className = 'd-block mt-1';
    }
    
    // Limpiar el select de tipo correspondiente
    var selectId = tipoEquipo === 'gateway' ? 'tipo-gateway' : 'tipo-camara';
    var select = document.getElementById(selectId);
    if (select) select.value = '';
    return;
  }

  // Limpiar serie (quitar guiones y espacios)
  var serieLimpia = serie.toUpperCase().replace(/[-_\s]/g, '').trim();
  console.log('   Serie limpia:', serieLimpia);

  // Llamar al backend para validar la serie en el inventario
  google.script.run
    .withSuccessHandler(function(resp) {
      console.log('✅ Respuesta validación:', resp);
      
      var validacion = document.getElementById('serie-validacion');
      
      if (!resp.ok) {
        if (validacion) {
          validacion.innerHTML = '❌ ' + (resp.error || 'Error al validar serie');
          validacion.className = 'd-block mt-1 text-danger';
        }
        return;
      }

      // ✅ Si la serie existe en el inventario
      if (resp.encontrada) {
        // ✅ Actualizar el select de tipo correspondiente
        var selectId = tipoEquipo === 'gateway' ? 'tipo-gateway' : 'tipo-camara';
        var select = document.getElementById(selectId);
        if (select && resp.tipo) {
          // Buscar la opción que coincida con el tipo
          var found = false;
          for (var i = 0; i < select.options.length; i++) {
            if (select.options[i].value === resp.tipo) {
              select.selectedIndex = i;
              found = true;
              break;
            }
          }
          if (!found) {
            // Si no existe la opción, agregarla
            var option = document.createElement('option');
            option.value = resp.tipo;
            option.textContent = resp.tipoNombre || resp.tipo;
            select.appendChild(option);
            select.value = resp.tipo;
          }
          console.log('✅ Tipo autocompletado:', resp.tipo);
        }

        // ✅ Mostrar mensaje de éxito con el estado del equipo
        if (validacion) {
          var estadoTexto = resp.estado || '';
          var estadoBadge = '';
          var estadoColor = '';
          if (estadoTexto === 'Disponible') {
            estadoBadge = '🟢';
            estadoColor = 'text-success';
          } else if (estadoTexto === 'Instalado') {
            estadoBadge = '🔵';
            estadoColor = 'text-primary';
          } else if (estadoTexto === 'Garantía') {
            estadoBadge = '🟡';
            estadoColor = 'text-warning';
          } else {
            estadoBadge = '⚪';
            estadoColor = 'text-secondary';
          }
          validacion.innerHTML = `✅ ${resp.tipoNombre || resp.tipo} (${estadoBadge} ${estadoTexto || 'Desconocido'})`;
          validacion.className = `d-block mt-1 ${estadoColor}`;
        }
      } else {
        // ❌ La serie no existe en el inventario
        if (validacion) {
          validacion.innerHTML = '❌ Serie no encontrada en el inventario';
          validacion.className = 'd-block mt-1 text-danger';
        }
      }
    })
    .withFailureHandler(function(err) {
      console.error('❌ Error al validar serie:', err);
      var validacion = document.getElementById('serie-validacion');
      if (validacion) {
        validacion.innerHTML = '❌ Error de conexión: ' + err.message;
        validacion.className = 'd-block mt-1 text-danger';
      }
    })
    .validarSerieGPSInventario(APP.token, serieLimpia, tipoEquipo);
}
