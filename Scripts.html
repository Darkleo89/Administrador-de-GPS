// COMPRESIÓN DE IMÁGENES
// ════════════════════════════════════════════════════════════
function comprimirImagen(file, calidad, maxWidth, maxHeight) {
  return new Promise(function(resolve, reject) {
    calidad = calidad || 80;
    maxWidth = maxWidth || 1200;
    maxHeight = maxHeight || 1200;

    if (!file.type.startsWith('image/')) { reject(new Error('El archivo no es una imagen.')); return; }

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        try {
          var width = img.width;
          var height = img.height;
          if (width > maxWidth || height > maxHeight) {
            var ratio = Math.min(maxWidth / width, maxHeight / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }

          var canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          var mimeType = 'image/jpeg';
          if (file.type === 'image/png') mimeType = 'image/png';
          else if (file.type === 'image/webp') mimeType = 'image/webp';

          var calidadFinal = calidad / 100;
          var dataUrl = canvas.toDataURL(mimeType, calidadFinal);
          var sizeOriginal = file.size;
          var sizeComprimido = Math.round(dataUrl.length * 0.75);

          resolve({
            nombre: file.name,
            tipo: mimeType,
            base64: dataUrl.split(',')[1],
            preview: dataUrl,
            tamañoOriginal: sizeOriginal,
            tamañoComprimido: sizeComprimido,
            width: width,
            height: height
          });
        } catch (err) { reject(new Error('Error al comprimir la imagen: ' + err.message)); }
      };
      img.onerror = function() { reject(new Error('Error al cargar la imagen.')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('Error al leer el archivo.')); };
    reader.readAsDataURL(file);
  });
}

function comprimirImagenes(files, calidad) {
  var promesas = [];
  for (var i = 0; i < files.length; i++) {
    promesas.push(comprimirImagen(files[i], calidad));
  }
  return Promise.all(promesas);
}

function verificarDiscrepanciaFechas() {
  var fechaInput = document.getElementById('inp-fecha');
  var fechaAdvertencia = document.getElementById('fecha-advertencia');
  var fechaMensaje = document.getElementById('fecha-mensaje');

  if (!fechaInput || !fechaInput.value) { if (fechaAdvertencia) fechaAdvertencia.style.display = 'none'; return; }

  var fechaServicio = new Date(fechaInput.value);
  var fechaActual = new Date();
  fechaServicio.setHours(0, 0, 0, 0);
  fechaActual.setHours(0, 0, 0, 0);

  var diffTime = fechaActual.getTime() - fechaServicio.getTime();
  var diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays > 3) {
    fechaAdvertencia.style.display = 'block';
    fechaMensaje.textContent = '⚠️ El servicio fue hace ' + diffDays + ' días. Revisa que la fecha sea correcta.';
    fechaAdvertencia.className = 'small text-warning mt-1';
    fechaInput.style.borderColor = '#ffc107';
  } else if (diffDays < 0) {
    fechaAdvertencia.style.display = 'block';
    fechaMensaje.textContent = '📅 La fecha del servicio es en el futuro. ¿Es correcta?';
    fechaAdvertencia.className = 'small text-info mt-1';
    fechaInput.style.borderColor = '#0dcaf0';
  } else {
    fechaAdvertencia.style.display = 'none';
    fechaInput.style.borderColor = '';
  }
}

function establecerFechaPorDefecto() {
  var fechaInput = document.getElementById('inp-fecha');
  if (fechaInput && !fechaInput.value) {
    var hoy = new Date();
    fechaInput.value = hoy.toISOString().split('T')[0];
    verificarDiscrepanciaFechas();
  }
}
// ✅ Función auxiliar para escapar HTML (evita XSS)
function escapaHTML(texto) {
  if (!texto) return '';
  const mapa = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return texto.replace(/[&<>"']/g, function(m) { return mapa[m]; });
}

function abrirModalCorte() {

function cargarTickets() {
  console.log('🎫 cargarTickets - Ejecutando');

  const tbody = document.getElementById('tickets-body');
  const totalText = document.getElementById('tickets-total-text');

  if (!tbody) {
    console.warn('⚠️ No se encontró tbody de tickets');
    return;
  }

  tbody.innerHTML = `
    <tr>
      <td colspan="8" class="text-center text-muted py-3">
        <div class="spinner-border spinner-border-sm me-2"></div>
        Cargando tickets...
      </td>
    </tr>
  `;

  if (!APP.token) {
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="text-center text-danger py-3">
          Sesión expirada. Recarga la página.
        </td>
      </tr>
    `;
    return;
  }

  // Obtener filtros
  const filtros = {
    estado: document.getElementById('fil-ticket-estado')?.value || '',
    unidad: document.getElementById('fil-ticket-unidad')?.value || '',
    tecnico: document.getElementById('fil-ticket-tecnico')?.value || ''
  };

  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp || !resp.ok) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="text-center text-danger py-3">
              ${resp?.error || 'Error al cargar tickets'}
            </td>
          </tr>
        `;
        return;
      }

      const tickets = resp.tickets || [];

      if (tickets.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="text-center text-muted py-3">
              No hay tickets con los filtros seleccionados.
            </td>
          </tr>
        `;
        if (totalText) totalText.textContent = 'Total: 0 tickets';
        actualizarResumenTickets(tickets);
        return;
      }

      // Renderizar tickets con botones de acción
      let html = '';
      const esAdmin = APP.sesion.rol <= 2;
      const esTecnico = APP.sesion.rol === 3;

      tickets.forEach(function(t) {
        const estadoLower = (t.estado || '').toLowerCase();
        const badgeClass = estadoLower === 'pendiente' ? 'badge bg-warning text-dark' :
                           estadoLower === 'en proceso' ? 'badge bg-primary' :
                           estadoLower === 'resuelto' ? 'badge bg-success' : 'badge bg-secondary';

        // Determinar qué botones mostrar según rol y estado
        let botones = '';

        // Botón: Ver detalle (todos)
        botones += `
          <button class="btn btn-sm btn-outline-info" onclick="verDetalleTicket('${t.id}')" title="Ver detalle">
            <i class="bi bi-eye"></i>
          </button>
        `;

        // Botón: Gestionar técnicos autorizados (solo Admin/Revisor)
        if (esAdmin) {
          botones += `
            <button class="btn btn-sm btn-outline-secondary" onclick="abrirGestionTecnicos('${t.id}')" title="Gestionar técnicos autorizados">
              <i class="bi bi-people"></i>
            </button>
          `;
        }

        // Botón: Tomar ticket (solo técnicos, solo si está Pendiente)
        if (esTecnico && t.estado === 'Pendiente') {
          botones += `
            <button class="btn btn-sm btn-primary" onclick="tomarTicket('${t.id}')" title="Tomar ticket">
              <i class="bi bi-hand-index-thumb"></i>
            </button>
          `;
        }

        // ✅ Botón: Resolver ticket (SOLO para técnicos con ticket asignado EN PROCESO)
        // El Admin NO ve este botón, usa el "✅" del grupo de abajo
        if (esTecnico && t.tecnico === APP.sesion.usuarioId && t.estado === 'En proceso') {
          botones += `
            <button class="btn btn-sm btn-success" onclick="resolverTicket('${t.id}')" title="Resolver ticket">
              <i class="bi bi-check-circle"></i>
            </button>
          `;
        }

        // Botones de cambio rápido de estado (solo Admin/Revisor)
        if (esAdmin) {
          botones += `
            <div class="btn-group btn-group-sm" role="group">
              <button class="btn btn-outline-warning" onclick="cambiarEstadoTicket('${t.id}', 'Pendiente')" title="Pendiente">
                ⏳
              </button>
              <button class="btn btn-outline-primary" onclick="cambiarEstadoTicket('${t.id}', 'En proceso')" title="En proceso">
                🔄
              </button>
              <button class="btn btn-outline-success" onclick="cambiarEstadoTicket('${t.id}', 'Resuelto')" title="Resuelto">
                ✅
              </button>
            </div>
          `;
        }

        html += `
          <tr>
            <td><code>${t.id}</code></td>
            <td>${t.fecha || '—'}</td>
            <td>${t.unidad || '—'}</td>
            <td>${(t.descripcion || '').substring(0, 30)}${(t.descripcion || '').length > 30 ? '...' : ''}</td>
            <td><span class="${badgeClass}">${t.estado || '—'}</span></td>
            <td>${t.tecnicoNombre || '—'}</td>
            <td>${t.creadoPorNombre || '—'}</td>
            <td>
              <div class="d-flex gap-1 flex-wrap" style="min-width: 120px;">
                ${botones}
              </div>
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;

      if (totalText) {
        totalText.textContent = `Total: ${tickets.length} tickets`;
      }

      // Actualizar resumen de tickets
      actualizarResumenTickets(tickets);

      console.log('✅ Tickets cargados:', tickets.length);

    })
    .withFailureHandler(function(err) {
      console.error('❌ Error en cargarTickets:', err);
      tbody.innerHTML = `
        <tr>
          <td colspan="8" class="text-center text-danger py-3">
            Error: ${err.message}
          </td>
        </tr>
      `;
      mostrarToast('Error al cargar tickets: ' + err.message, 'error');
    })
    .obtenerTickets(APP.token, filtros);
}

function editarTicket(ticketId) {
  console.log('📝 editarTicket - Folio:', ticketId);
  
  if (!ticketId) {
    mostrarToast('❌ No se especificó un ticket.', 'error');
    return;
  }

  mostrarToast('📝 Cargando ticket para editar...', 'info');

  // Primero cargamos el ticket y los vehículos en paralelo
  var promesaTicket = new Promise(function(resolve, reject) {
    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          resolve(resp.ticket);
        } else {
          reject(resp?.error || 'Error al cargar ticket');
        }
      })
      .withFailureHandler(function(err) {
        reject(err.message);
      })
      .obtenerTicket(APP.token, ticketId);
  });

  var promesaVehiculos = new Promise(function(resolve, reject) {
    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          resolve(resp.vehiculos || []);
        } else {
          reject(resp?.error || 'Error al cargar vehículos');
        }
      })
      .withFailureHandler(function(err) {
        reject(err.message);
      })
      .obtenerVehiculosFlotilla(APP.token);
  });

  Promise.all([promesaTicket, promesaVehiculos])
    .then(function(resultados) {
      var ticket = resultados[0];
      var vehiculos = resultados[1];

      // Crear modal de edición con selector de vehículos
      var modalHtml = `

              </div>
              <div class="modal-body">
                <form id="form-editar-ticket">
                  <div class="mb-3">
                    <label class="form-label">Unidad (Económico) *</label>
                    <select class="form-select" id="edit-ticket-unidad" required>
                      <option value="">Selecciona un vehículo...</option>
      `;

      // Llenar selector con vehículos
      if (vehiculos && vehiculos.length > 0) {
        vehiculos.forEach(function(vehiculo) {
          var selected = (vehiculo.economico === ticket.UNIDAD) ? 'selected' : '';
          modalHtml += `
                      <option value="${vehiculo.economico}" ${selected}>
                        ${vehiculo.economico} - ${vehiculo.placas || 'Sin placas'}
                      </option>
          `;
        });
      } else {
        modalHtml += `
                      <option value="">No hay vehículos registrados</option>
        `;
      }

      modalHtml += `
                    </select>
                    <div class="form-text">Selecciona el vehículo afectado</div>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Descripción *</label>
                    <textarea class="form-control" id="edit-ticket-descripcion" rows="3" required>${ticket.DESCRIPCION || ''}</textarea>
                  </div>
                  <div class="row">
                    <div class="col-md-6">
                      <label class="form-label">Estado</label>
                      <select class="form-select" id="edit-ticket-estado">
                        <option value="Pendiente" ${ticket.ESTADO === 'Pendiente' ? 'selected' : ''}>⏳ Pendiente</option>
                        <option value="En proceso" ${ticket.ESTADO === 'En proceso' ? 'selected' : ''}>🔄 En proceso</option>
                        <option value="Resuelto" ${ticket.ESTADO === 'Resuelto' ? 'selected' : ''}>✅ Resuelto</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Prioridad</label>
                      <select class="form-select" id="edit-ticket-prioridad">
                        <option value="Baja" ${ticket.PRIORIDAD === 'Baja' ? 'selected' : ''}>🟢 Baja</option>
                        <option value="Media" ${ticket.PRIORIDAD === 'Media' ? 'selected' : ''}>🟡 Media</option>
                        <option value="Alta" ${ticket.PRIORIDAD === 'Alta' ? 'selected' : ''}>🔴 Alta</option>
                      </select>
                    </div>
                  </div>
                  <div class="mb-3 mt-3">
                    <label class="form-label">Comentarios</label>
                    <textarea class="form-control" id="edit-ticket-comentarios" rows="2">${ticket.COMENTARIOS || ''}</textarea>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Notas internas</label>
                    <textarea class="form-control" id="edit-ticket-notas" rows="2">${ticket.NOTAS_INTERNAS || ''}</textarea>

        document.body.appendChild(div);

function crearTicket() {
  var unidad = document.getElementById('ticket-unidad').value;
  var descripcion = document.getElementById('ticket-descripcion').value.trim();

  if (!unidad) { mostrarToast('⚠️ Debes seleccionar una unidad.', 'error'); return; }
  if (!descripcion || descripcion.length < 10) { mostrarToast('⚠️ La descripción debe tener al menos 10 caracteres.', 'error'); return; }

  mostrarToast('🎫 Creando ticket...', 'info');
  document.querySelector('#modalNuevoTicket .btn-primary').disabled = true;

  google.script.run
    .withSuccessHandler(function(resp) {
      document.querySelector('#modalNuevoTicket .btn-primary').disabled = false;
      if (resp.ok) {
        mostrarToast('✅ Ticket ' + resp.id + ' creado correctamente.', 'success');
        var modal = bootstrap.Modal.getInstance(document.getElementById('modalNuevoTicket'));
        if (modal) modal.hide();
        cargarTickets();
        cargarDashboard();
      } else mostrarToast('❌ Error: ' + resp.error, 'error');
    })
    .withFailureHandler(function(err) {
      document.querySelector('#modalNuevoTicket .btn-primary').disabled = false;
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .crearTicket(APP.token, { unidad: unidad, descripcion: descripcion });
}

function tomarTicket(ticketId) {

// ESCANEO - CÁMARA Y OCR

function iniciarEscaneo() {
  var opcion = confirm('📷 Escanear código de GPS\n\n¿Quieres usar la cámara para escanear?\n• "Aceptar" → Usar cámara\n• "Cancelar" → Ingresar manualmente');
  if (opcion) solicitarCamaraYEscanner();
  else ingresarManualEscaneo();
}

function solicitarCamaraYEscanner() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    mostrarToast('❌ Tu navegador no soporta la cámara.', 'error');
    if (confirm('¿Quieres ingresar el código manualmente?')) ingresarManualSerie();
    return;
  }

  var enIframe = window !== window.top;
  if (enIframe) {
    mostrarToast('⚠️ La cámara no funciona en iframes.', 'error');
    if (confirm('¿Quieres ingresar el código manualmente?')) ingresarManualSerie();
    return;
  }

  if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
    mostrarToast('⚠️ La cámara requiere HTTPS.', 'error');
    if (confirm('¿Quieres ingresar el código manualmente?')) ingresarManualSerie();
    return;
  }

  mostrarToast('📷 Solicitando acceso a la cámara...', 'info');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } })
    .then(function(stream) {
      mostrarToast('✅ Cámara activa', 'success');
      iniciarScannerUI(stream);
    })
    .catch(function(err) {
      var mensaje = err.name === 'NotAllowedError' ? '❌ Permiso denegado.' : '❌ ' + (err.message || 'Error al acceder a la cámara.');
      mostrarToast(mensaje, 'error');
      if (confirm(mensaje + '\n\n¿Quieres ingresar el código manualmente?')) ingresarManualSerie();
    });
}

function iniciarScannerUI(stream) {
  var overlay = document.createElement('div');
  overlay.id = 'scanner-overlay';
  overlay.style.cssText = `
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  `;

  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:20px;max-width:420px;width:100%;text-align:center;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h5 class="mb-0">📷 Escanear código</h5>
        <button type="button" class="btn-close" onclick="cancelarEscaneo()"></button>
      </div>
      <p class="text-muted small">Apunta la cámara al código de barras o QR del GPS</p>
      <div id="scanner-container" style="width:100%;aspect-ratio:1;background:#000;border-radius:8px;overflow:hidden;position:relative;">
        <video id="scanner-video" style="width:100%;height:100%;object-fit:cover;display:block;"></video>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid rgba(255,255,255,0.5);border-radius:8px;"></div>
      </div>
      <div id="scanner-result" class="mt-3" style="display:none;">
        <div class="alert alert-success small"><strong>Código detectado:</strong> <span id="scanner-code"></span></div>
      </div>
      <div class="d-flex gap-2 mt-3 justify-content-center flex-wrap">
        <button class="btn btn-outline-secondary btn-sm" onclick="ingresarManualSerie()"><i class="bi bi-keyboard me-1"></i>Ingresar manual</button>
        <button class="btn btn-success btn-sm" onclick="confirmarEscaneo()" style="display:none;" id="btn-confirmar-scan"><i class="bi bi-check me-1"></i>Confirmar</button>
        <button class="btn btn-danger btn-sm" onclick="cancelarEscaneo()"><i class="bi bi-x me-1"></i>Cancelar</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  var video = document.getElementById('scanner-video');
  video.srcObject = stream;
  video.play();

  window._scannerStream = stream;

  setTimeout(function() {
    var resultDiv = document.getElementById('scanner-result');
    var codeSpan = document.getElementById('scanner-code');
    resultDiv.style.display = 'block';
    codeSpan.textContent = 'GTMF-RYD-W8S';
    document.getElementById('btn-confirmar-scan').style.display = 'inline-block';
  }, 3000);
}

function cancelarEscaneo() {
  var overlay = document.getElementById('scanner-overlay');
  if (overlay) overlay.remove();
  if (window._scannerStream) {
    try { window._scannerStream.getTracks().forEach(function(track) { track.stop(); }); } catch (e) {}
    window._scannerStream = null;
  }
}

function confirmarEscaneo() {
  var codigo = document.getElementById('scanner-code').textContent;
  if (codigo && codigo !== 'GTMF-XXX-XXX') {
    document.getElementById('inp-serie').value = codigo;
    document.getElementById('inp-serie').dispatchEvent(new Event('input'));
    mostrarToast('✅ Código escaneado: ' + codigo, 'success');
    cancelarEscaneo();
  } else ingresarManualEscaneo();
}

function ingresarManualEscaneo() {
  cancelarEscaneo();
  var manual = prompt('📝 Ingresa el código de serie del GPS\n\nFormato: XXX-XXX-XXX\nEjemplo: GTMF-RYD-W8S\n\nEscribe el código:');
  if (manual !== null) {
    var codigo = manual.trim().toUpperCase();
    if (codigo !== '') {
      var regex = /^[A-Z0-9]{3}-[A-Z0-9]{3}-[A-Z0-9]{3}$/;
      if (!regex.test(codigo)) {
        mostrarToast('⚠️ Formato inválido. Usa: XXX-XXX-XXX', 'error');
        if (confirm('¿Quieres intentar de nuevo?')) ingresarManualEscaneo();
      } else {
        document.getElementById('inp-serie').value = codigo;
        document.getElementById('inp-serie').dispatchEvent(new Event('input'));
        mostrarToast('✅ Código ingresado: ' + codigo, 'success');
      }
    }
  }
}

function ingresarManualSerie() {
  var manual = prompt('📝 Ingresa el código de serie del GPS\n\nPuedes escribirlo con o sin guiones.\nEjemplo: GTMF-RYD-W8S o GTMFRYDW8S\n\nEscribe el código:');
  if (manual === null) return;

  var codigo = manual.trim().toUpperCase();
  if (codigo === '') { mostrarToast('⚠️ No ingresaste ningún texto', 'warning'); return; }

  if (codigo.length === 9 && /^[A-Z0-9]{9}$/.test(codigo)) {
    codigo = codigo.substring(0, 3) + '-' + codigo.substring(3, 6) + '-' + codigo.substring(6, 9);
  }

  var regex = /^[A-Z0-9]{4}-[A-Z0-9]{3}-[A-Z0-9]{3}$/;
  if (!regex.test(codigo)) {
    mostrarToast('⚠️ Formato inválido. Usa: XXXX-XXX-XXX', 'error');
    if (confirm('¿Quieres intentar de nuevo?')) setTimeout(ingresarManualSerie, 100);
    return;
  }

  var inputSerie = document.getElementById('inp-serie');
  if (inputSerie) {
    inputSerie.value = codigo;
    validarSerieGPS(codigo);
    inputSerie.dispatchEvent(new Event('input', { bubbles: true }));
  }
  mostrarToast('✅ Código ingresado: ' + codigo, 'success');
}

function abrirCamaraTesseract(targetInput) {
  var inputId = targetInput || 'serie-gateway';
  if (_procesandoOCR) { mostrarToast('⏳ Ya hay un proceso en curso, espera...', 'info'); return; }

  mostrarToast('📷 Abriendo cámara...', 'info');
  window._ocrTargetInput = inputId;

  var ocrResultado = document.getElementById('ocr-resultado');
  var ocrProgreso = document.getElementById('ocr-progreso');
  if (ocrResultado) ocrResultado.style.display = 'block';
  if (ocrProgreso) { ocrProgreso.style.display = 'block';
    var estado = document.getElementById('ocr-estado'); if (estado) estado.textContent = 'Preparando cámara...'; }

  var input = document.getElementById('camaraTesseractInput');
  if (!input) { mostrarToast('❌ Error: No se encontró el elemento de cámara', 'error'); return; }

  if (_ocrInputListener) { input.removeEventListener('change', _ocrInputListener);
    _ocrInputListener = null; }

  _ocrInputListener = function(e) {
    if (this.files && this.files.length > 0) {
      _procesandoOCR = true;
      procesarFotoTesseract(this);
    }
    this.value = '';
  };

  input.addEventListener('change', _ocrInputListener);
  input.value = '';
  input.click();
}

function procesarFotoTesseract(input) {
  if (!input || !input.files || input.files.length === 0) {
    mostrarToast('❌ No se seleccionó ninguna imagen', 'error');
    _procesandoOCR = false;
    return;
  }

  var file = input.files[0];
  if (!file.type.startsWith('image/')) {
    mostrarToast('❌ El archivo no es una imagen', 'error');
    _procesandoOCR = false;
    return;
  }

  _procesandoOCR = true;

  var ocrProgreso = document.getElementById('ocr-progreso');
  var ocrResultadoTexto = document.getElementById('ocr-resultado-texto');
  var ocrError = document.getElementById('ocr-error');

  if (ocrProgreso) { ocrProgreso.style.display = 'block';
    var estado = document.getElementById('ocr-estado'); if (estado) estado.textContent = '📤 Cargando motor de IA...'; }
  if (ocrResultadoTexto) ocrResultadoTexto.style.display = 'none';
  if (ocrError) ocrError.style.display = 'none';

  mostrarToast('🔍 Inicializando OCR en el dispositivo...', 'info');

  var worker;

  Tesseract.createWorker({
    logger: function(m) {
      if (!_procesandoOCR) return;
      if (m.status === 'recognizing text') {
        var progreso = Math.round(m.progress * 100);
        var progressBar = document.getElementById('ocr-progress-bar');
        var estado = document.getElementById('ocr-estado');
        if (progressBar) progressBar.style.width = progreso + '%';
        if (estado) estado.textContent = '🔍 Reconociendo texto... ' + progreso + '%';
      }
    }
  })
    .then(function(w) {
      worker = w;
      return worker.loadLanguage('spa+eng');
    })
    .then(function() {
      return worker.initialize('spa+eng');
    })
    .then(function() {
      if (!_procesandoOCR) { if (worker) worker.terminate(); return null; }
      return worker.recognize(file);
    })
    .then(function(resultado) {
      if (!resultado || !_procesandoOCR) { console.log('Proceso cancelado.'); return; }

      var textoExtraido = resultado.data.text || '';
      var serieGPS = extraerSerieGPSTexto(textoExtraido);

      var ocrProgreso = document.getElementById('ocr-progreso');
      var ocrResultadoTexto = document.getElementById('ocr-resultado-texto');
      var ocrTextoDetectado = document.getElementById('ocr-texto-detectado');
      var ocrError = document.getElementById('ocr-error');

      if (serieGPS) {
        if (ocrProgreso) ocrProgreso.style.display = 'none';
        if (ocrResultadoTexto) ocrResultadoTexto.style.display = 'block';
        if (ocrTextoDetectado) ocrTextoDetectado.textContent = serieGPS;
        _codigoDetectado = serieGPS;
        mostrarToast('✅ Código detectado: ' + serieGPS, 'success');
      } else {
        if (ocrProgreso) ocrProgreso.style.display = 'none';
        if (ocrError) {
          ocrError.style.display = 'block';
          ocrError.textContent = '❌ No se detectó un código de serie GPS válido (formato XXXX-XXX-XXX).';
        }
        mostrarToast('❌ No se detectó código de serie GPS (formato XXXX-XXX-XXX)', 'error');
      }
      _procesandoOCR = false;
      if (worker) worker.terminate();
    })
    .catch(function(err) {
      var ocrProgreso = document.getElementById('ocr-progreso');
      var ocrError = document.getElementById('ocr-error');
      if (ocrProgreso) ocrProgreso.style.display = 'none';
      if (ocrError) { ocrError.style.display = 'block';
        ocrError.textContent = '❌ Error al procesar la imagen: ' + (err.message || err); }
      mostrarToast('❌ Error en OCR: ' + (err.message || err), 'error');
      if (worker) worker.terminate();
      _procesandoOCR = false;
    });
}

function extraerSerieGPSTexto(texto) {
  if (!texto || texto.length === 0) return null;

  var textoOriginal = texto.toUpperCase();
  var regexEspacios = /[A-Z0-9]{4}\s+[A-Z0-9]{3}\s+[A-Z0-9]{3}/g;
  var coincidenciasEspacios = textoOriginal.match(regexEspacios);

  if (coincidenciasEspacios && coincidenciasEspacios.length > 0) {
    return coincidenciasEspacios[0].replace(/\s+/g, '-').replace(/\|/g, '1');
  }

  var textoLimpio = textoOriginal.replace(/\s+/g, '');
  var regexExacto = /[A-Z0-9]{4}-[A-Z0-9]{3}-[A-Z0-9]{3}/g;
  var coincidencias = textoLimpio.match(regexExacto);

  if (coincidencias && coincidencias.length > 0) {
    return coincidencias[0].replace(/\|/g, '1');
  }

  var regexDiez = /\b[A-Z0-9]{10}\b/g;
  var coincidenciasDiez = textoLimpio.match(regexDiez);
  if (!coincidenciasDiez) {
    var regexDiezPura = /[A-Z0-9]{10}/g;
    coincidenciasDiez = textoLimpio.match(regexDiezPura);
  }

  if (coincidenciasDiez && coincidenciasDiez.length > 0) {
    var codigoPuro = coincidenciasDiez[0];
    return codigoPuro.substring(0, 4) + '-' + codigoPuro.substring(4, 7) + '-' + codigoPuro.substring(7, 10).replace(/\|/g, '1');
  }

  return null;
}

function confirmarOCR() {
  var ocrTextoDetectado = document.getElementById('ocr-texto-detectado');
  var codigoAInyectar = _codigoDetectado || (ocrTextoDetectado ? ocrTextoDetectado.textContent.trim() : null);

  if (!codigoAInyectar) { mostrarToast('⚠️ No hay código detectado para confirmar', 'warning'); return; }

  var targetInputId = window._ocrTargetInput || 'serie-gateway';
  var inputSerie = document.getElementById(targetInputId);

  if (inputSerie) {
    inputSerie.value = codigoAInyectar;
    validarSerieGPS(codigoAInyectar);
    inputSerie.dispatchEvent(new Event('input', { bubbles: true }));
  }

  ocultarOCR();
  mostrarToast('✅ Código ingresado: ' + codigoAInyectar, 'success');
  _codigoDetectado = null;
  window._ocrTargetInput = null;
}

function ocultarOCR() {
  var ocrResultado = document.getElementById('ocr-resultado');
  var ocrProgreso = document.getElementById('ocr-progreso');
  var ocrResultadoTexto = document.getElementById('ocr-resultado-texto');
  var ocrError = document.getElementById('ocr-error');

  if (ocrResultado) ocrResultado.style.display = 'none';
  if (ocrProgreso) ocrProgreso.style.display = 'none';
  if (ocrResultadoTexto) ocrResultadoTexto.style.display = 'none';
  if (ocrError) ocrError.style.display = 'none';

  var input = document.getElementById('camaraTesseractInput');
  if (input) input.value = '';

  _procesandoOCR = false;
  _codigoDetectado = null;
  window._ocrTargetInput = null;
}

function cancelarOCR() {
  _procesandoOCR = false;
  ocultarOCR();
  _codigoDetectado = null;
  window._ocrTargetInput = null;
  mostrarToast('OCR cancelado', 'info');
}

function reintentarOCR() {
  _codigoDetectado = null;
  var targetInput = window._ocrTargetInput || 'serie-gateway';
  abrirCamaraTesseract(targetInput);
}

function validarSerieGPS(valor) {
  var validacion = document.getElementById('serie-validacion');
  if (!validacion) return;

  valor = valor.trim().toUpperCase();
  var regex = /^[A-Z0-9]{4}-[A-Z0-9]{3}-[A-Z0-9]{3}$/;

  if (valor.length === 0) { validacion.innerHTML = '';
    validacion.className = 'd-block mt-1'; return; }

  if (regex.test(valor)) {
    validacion.innerHTML = '✅ Formato válido';
    validacion.className = 'd-block mt-1 text-success';
  } else {
    var sugerencia = valor.replace(/([A-Z0-9]{4})([A-Z0-9]{3})([A-Z0-9]{3})/i, '$1-$2-$3');
    if (sugerencia.length === 11 && regex.test(sugerencia)) {
      validacion.innerHTML = `💡 ¿Quieres decir: <strong>${sugerencia}</strong>? <a href="#" onclick="document.getElementById('inp-serie').value='${sugerencia}'; validarSerieGPS('${sugerencia}'); return false;">Aplicar</a>`;
      validacion.className = 'd-block mt-1 text-warning';
    } else {
      validacion.innerHTML = '⚠️ Formato inválido. Usa: XXXX-XXX-XXX';
      validacion.className = 'd-block mt-1 text-danger';
    }
  }
}

function descargarPDF(folio) {
  if (!folio) { mostrarToast('⚠️ Folio no válido', 'warning'); return; }

  mostrarToast('📄 Generando PDF para ' + folio + '...', 'info');

  google.script.run
    .withSuccessHandler(function(response) {
      if (response.ok) {
        var link = document.createElement('a');
        link.download = response.nombre || 'Reporte_' + folio + '.pdf';
        link.href = 'data:application/pdf;base64,' + response.pdfBase64;
        document.body.appendChild(link);
        link.click();

        mostrarToast('✅ PDF descargado exitosamente', 'success');

// 6. Editar estado existente (cargar datos)
function editarEstado(id) {
  if (!id) {
    mostrarToast('⚠️ No se especificó el estado a editar.', 'error');
    return;
  }

  if (!APP.token) {
    mostrarToast('⚠️ Sesión expirada.', 'error');
    return;
  }

  mostrarToast('📋 Cargando datos del estado...', 'info');

  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        mostrarToast('❌ ' + resp.error, 'error');
        return;
      }

      // Buscar el estado por ID
      var estado = null;
      if (resp.estados) {
        for (var i = 0; i < resp.estados.length; i++) {
          if (resp.estados[i].id == id) {
            estado = resp.estados[i];
            break;
          }
        }
      }

      if (!estado) {
        mostrarToast('❌ No se encontró el estado con ID: ' + id, 'error');
        return;
      }

      // Cargar datos en el formulario
      document.getElementById('estado-form-nombre').value = estado.nombre || '';
      document.getElementById('estado-form-color').value = estado.color || 'secondary';
      document.getElementById('estado-form-activo').value = estado.activo ? 'true' : 'false';
      document.getElementById('estado-form-descripcion').value = estado.descripcion || '';
      document.getElementById('estado-form-editando').value = 'true';
      document.getElementById('estado-form-id').value = estado.id;
      document.getElementById('estado-form-titulo').innerHTML = '<i class="bi bi-pencil me-1"></i>Editar estado: ' + estado.nombre;

      // Mostrar el formulario
      var container = document.getElementById('estado-form-container');
      if (container) {
        container.style.display = 'block';
        document.getElementById('estado-form-nombre').focus();
      }

    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .obtenerTodosLosEstadosVehiculo(APP.token);
}

/**
 * Carga la lista de usuarios
 */
function cargarListaUsuarios() {
  var tbody = document.getElementById('usuarios-body');
  if (!tbody) return;

  tbody.innerHTML = `
    <tr><td colspan="7" class="text-center text-muted py-3">
      <div class="spinner-border spinner-border-sm me-2"></div>Cargando usuarios...
    </td></tr>
  `;

  if (!APP.token) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-3">Sesión expirada.</td></tr>';
    return;
  }

  // Obtener filtros
  var filtroRol = document.getElementById('fil-usuarios-rol')?.value || '';
  var filtroEstado = document.getElementById('fil-usuarios-estado')?.value || '';
  var filtroBuscar = document.getElementById('fil-usuarios-buscar')?.value || '';

  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-3">${resp.error}</td></tr>`;
        return;
      }

      var usuarios = resp.usuarios || [];

      // Aplicar filtros
      if (filtroRol) {
        usuarios = usuarios.filter(function(u) { return u.rol === Number(filtroRol); });
      }
      if (filtroEstado) {
        var activo = filtroEstado === 'true';
        usuarios = usuarios.filter(function(u) { return u.activo === activo; });
      }
      if (filtroBuscar) {
        var busqueda = filtroBuscar.toLowerCase().trim();
        usuarios = usuarios.filter(function(u) {
          return u.nombre.toLowerCase().includes(busqueda) || 
                 u.usuario.toLowerCase().includes(busqueda);
        });
      }

      if (usuarios.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">No hay usuarios registrados.</td></tr>';
        document.getElementById('usuarios-total').textContent = 'Total: 0 usuarios';
        return;
      }

      // Construir tabla
      var html = '';
      var rolesLabel = { 1: 'Administrador', 2: 'Revisor', 3: 'Técnico' };

      usuarios.forEach(function(u) {
        var badgeRol = '';
        if (u.rol === 1) badgeRol = 'badge bg-danger';
        else if (u.rol === 2) badgeRol = 'badge bg-primary';
        else badgeRol = 'badge bg-success';

        var estadoBadge = u.activo 
          ? '<span class="badge bg-success">✅ Activo</span>' 
          : '<span class="badge bg-secondary">❌ Inactivo</span>';

        // Solo Admin puede ver botones de eliminar
        var esAdmin = APP.sesion && APP.sesion.rol === 1;
        // No permitir eliminar al usuario actual
        var esUsuarioActual = APP.sesion && APP.sesion.usuarioId === u.id;

        html += `
          <tr>
            <td><code style="font-size:12px;">${u.id}</code></td>
            <td><strong>${u.nombre}</strong></td>
            <td><code style="font-size:12px;">${u.usuario}</code></td>
            <td><span class="${badgeRol}" style="font-size:11px;">${u.rolLabel}</span></td>
            <td>${estadoBadge}</td>
            <td style="font-size:12px;">${u.ultimoAcceso || '—'}</td>
            <td style="text-align:center; white-space:nowrap;">
              <button class="btn btn-sm btn-outline-primary" onclick="editarUsuario('${u.id}')" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-warning" onclick="cambiarPassword('${u.id}')" title="Cambiar contraseña">
                <i class="bi bi-key"></i>
              </button>
              ${esAdmin && !esUsuarioActual ? `
                <button class="btn btn-sm btn-outline-danger" onclick="eliminarUsuario('${u.id}')" title="Desactivar">
                  <i class="bi bi-trash"></i>
                </button>
              ` : ''}
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
      document.getElementById('usuarios-total').textContent = 'Total: ' + usuarios.length + ' usuarios';

    })
    .withFailureHandler(function(err) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-3">Error: ${err.message}</td></tr>`;
    })
    .obtenerUsuarios(APP.token);
}

/**
 * Guarda un nuevo usuario
 */
function guardarUsuario() {
  var nombre = document.getElementById('usuario-nombre').value.trim();
  var usuario = document.getElementById('usuario-usuario').value.trim();
  var password = document.getElementById('usuario-password').value;
  var rol = document.getElementById('usuario-rol').value;
  var activo = document.getElementById('usuario-activo').checked;

  if (!nombre || !usuario || !password || !rol) {
    mostrarToast('⚠️ Todos los campos son requeridos.', 'error');
    return;

  if (password.length < 6) {
    mostrarToast('⚠️ La contraseña debe tener al menos 6 caracteres.', 'error');
    return;
  }

  var btnGuardar = document.querySelector('#modal-usuario .btn-primary');
  if (btnGuardar) {
    btnGuardar.disabled = true;
    btnGuardar.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Guardando...';
  }

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btnGuardar) {
        btnGuardar.disabled = false;
        btnGuardar.innerHTML = '<i class="bi bi-check me-1"></i>Guardar';
      }
      if (resp.ok) {
        mostrarToast('✅ ' + resp.mensaje, 'success');

        cargarListaUsuarios();

        mostrarToast('❌ ' + resp.error, 'error');
      }

    .withFailureHandler(function(err) {
      if (btnGuardar) {
        btnGuardar.disabled = false;
        btnGuardar.innerHTML = '<i class="bi bi-check me-1"></i>Guardar';
      }
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .agregarUsuario(APP.token, {
      nombre: nombre,
      usuario: usuario,
      password: password,
      rol: Number(rol),
      activo: activo
    });

/**

 */

  var id = document.getElementById('password-usuario-id').value;

  var confirmar = document.getElementById('password-confirmar').value;

    btnGuardar.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Guardando...';

/**
 * Guarda un parámetro individual con validación
 */
function guardarParametro(clave) {
  if (!clave) {
    mostrarToast('⚠️ No se especificó el parámetro.', 'error');
    return;
  }

  var input = document.getElementById('param-' + clave);
  if (!input) {
    mostrarToast('⚠️ No se encontró el campo para: ' + clave, 'error');
    return;
  }

  var valor = input.value.trim();

  // ✅ VALIDACIONES ESPECÍFICAS
  if (clave === 'CALIDAD_IMAGEN') {
    var num = Number(valor);
    if (isNaN(num) || num < 1 || num > 100) {
      mostrarToast('⚠️ CALIDAD_IMAGEN debe ser un número entre 1 y 100.', 'error');
      return;
    }
  }

  if (clave === 'MAX_IMAGENES_PDF') {
    var num = Number(valor);
    if (isNaN(num) || num < 1 || num > 20) {
      mostrarToast('⚠️ MAX_IMAGENES_PDF debe ser un número entre 1 y 20.', 'error');
      return;
    }
  }

  if (clave === 'DIAS_LIMITE_DRIVE') {
    var num = Number(valor);
    if (isNaN(num) || num < 1 || num > 365) {
      mostrarToast('⚠️ DIAS_LIMITE_DRIVE debe ser un número entre 1 y 365.', 'error');
      return;
    }
  }

  if (clave === 'COMPRESION_IMAGENES' || clave === 'VERBOSE_LOGGING') {
    var valLower = valor.toLowerCase();
    if (valLower !== 'true' && valLower !== 'false') {
      mostrarToast('⚠️ Debe ser true o false.', 'error');
      return;
    }
  }

  if (clave === 'CORREOS_DESTINO') {
    if (valor && !valor.includes('@')) {
      mostrarToast('⚠️ Ingresa correos válidos separados por comas.', 'error');
      return;
    }
  }

  if (clave === 'DRIVE_FOLDER_ID') {
    if (valor && !/^[a-zA-Z0-9_-]{20,}$/.test(valor)) {
      mostrarToast('⚠️ ID de carpeta Drive inválido.', 'error');
      return;
    }
  }

  // Deshabilitar botón
  var btn = input.closest('tr').querySelector('.btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
  }

  mostrarToast('💾 Guardando ' + clave + '...', 'info');

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check"></i>';
      }
      if (resp.ok) {
        mostrarToast('✅ ' + resp.mensaje, 'success');
        cargarParametros(); // Recargar para mostrar cambios
      } else {
        mostrarToast('❌ ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check"></i>';
      }
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .actualizarParametro(APP.token, clave, valor);
}

/**
 * Guarda todos los parámetros con validaciones
 */
function guardarTodosParametros() {
  var inputs = document.querySelectorAll('#parametros-container input, #parametros-container select');
  var parametros = [];
  var errores = [];
  var btn = document.getElementById('btn-guardar-todos');

  inputs.forEach(function(input) {
    var clave = input.dataset.clave;
    if (!clave) return;
    
    // Saltar parámetros auto-generados
    if (clave === 'FOLIO_ULTIMO' || clave === 'TICKET_ULTIMO') return;

    var valor = input.value.trim();

    // ✅ VALIDACIONES
    if (clave === 'CALIDAD_IMAGEN') {
      var num = Number(valor);
      if (isNaN(num) || num < 1 || num > 100) {
        errores.push(clave + ' debe ser entre 1 y 100');
        return;
      }
    }

    if (clave === 'MAX_IMAGENES_PDF') {
      var num = Number(valor);
      if (isNaN(num) || num < 1 || num > 20) {
        errores.push(clave + ' debe ser entre 1 y 20');
        return;
      }
    }

    if (clave === 'DIAS_LIMITE_DRIVE') {
      var num = Number(valor);
      if (isNaN(num) || num < 1 || num > 365) {
        errores.push(clave + ' debe ser entre 1 y 365');
        return;
      }
    }

    if (clave === 'COMPRESION_IMAGENES' || clave === 'VERBOSE_LOGGING') {
      var valLower = valor.toLowerCase();
      if (valLower !== 'true' && valLower !== 'false') {
        errores.push(clave + ' debe ser true o false');
        return;
      }
    }

    if (clave === 'CORREOS_DESTINO' && valor && !valor.includes('@')) {
      errores.push(clave + ' debe tener correos válidos');
      return;
    }

    if (clave === 'DRIVE_FOLDER_ID' && valor && !/^[a-zA-Z0-9_-]{20,}$/.test(valor)) {
      errores.push(clave + ' debe ser un ID de carpeta válido');
      return;
    }

    parametros.push({ clave: clave, valor: valor });
  });

  if (errores.length > 0) {
    mostrarToast('⚠️ Errores: ' + errores.join(', '), 'error');
    return;
  }

  if (parametros.length === 0) {
    mostrarToast('⚠️ No hay parámetros para guardar.', 'error');
    return;
  }

  // Deshabilitar botón
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Guardando...';
  }

  mostrarToast('💾 Guardando ' + parametros.length + ' parámetros...', 'info');

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-save me-1"></i>Guardar todos';
      }
      if (resp.ok) {
        mostrarToast('✅ ' + resp.mensaje, 'success');
        cargarParametros();
      } else {
        mostrarToast('❌ ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-save me-1"></i>Guardar todos';
      }
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .actualizarMultiplesParametros(APP.token, parametros);
}

/**
 * Carga las notificaciones del usuario (VERSIÓN MEJORADA)
 */
function cargarNotificaciones() {
  var container = document.getElementById('lista-notificaciones');
  if (!container) return;

  if (!APP.token) {
    container.innerHTML = '<div class="text-center text-muted py-3">Sesión expirada.</div>';
    return;
  }

  container.innerHTML = `
    <div class="text-center text-muted py-4">
      <div class="spinner-border spinner-border-sm me-2"></div>
      Cargando...
    </div>
  `;

  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        container.innerHTML = `<div class="text-center text-danger py-3">Error: ${resp.error}</div>`;
        return;
      }

      var notificaciones = resp.notificaciones || [];
      var noLeidas = resp.noLeidas || 0;

      // Actualizar badge
      var badge = document.getElementById('badge-notificaciones');
      if (badge) {
        if (noLeidas > 0) {
          badge.style.display = 'block';
          badge.textContent = noLeidas > 9 ? '9+' : noLeidas;
        } else {
          badge.style.display = 'none';
        }
      }

      // Actualizar total
      var totalEl = document.getElementById('campana-total');
      if (totalEl) {
        totalEl.textContent = noLeidas;
      }

      if (notificaciones.length === 0) {
        container.innerHTML = `
          <div class="text-center text-muted py-5">
            <i class="bi bi-inbox" style="font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.3;"></i>
            <p style="font-size: 14px;">No tienes notificaciones</p>
            <p style="font-size: 12px; color: #94a3b8;">Las notificaciones aparecerán aquí</p>
          </div>
        `;
        document.getElementById('campana-resumen').textContent = '0 notificaciones';
        return;
      }

      // Agrupar por fecha
      var hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      var ayer = new Date(hoy);
      ayer.setDate(ayer.getDate() - 1);

      var grupos = {
        hoy: [],
        ayer: [],
        semana: [],
        anteriores: []
      };

      notificaciones.forEach(function(n) {
        var fecha = new Date(n.fecha);
        fecha.setHours(0, 0, 0, 0);
        var diff = Math.floor((hoy - fecha) / (1000 * 60 * 60 * 24));

        if (diff === 0) grupos.hoy.push(n);
        else if (diff === 1) grupos.ayer.push(n);
        else if (diff <= 7) grupos.semana.push(n);
        else grupos.anteriores.push(n);
      });

      var html = '';
      var totalMostradas = 0;
      var maxMostrar = 20;

      var etiquetas = {
        hoy: '📍 HOY',
        ayer: '📅 AYER',
        semana: '📅 ESTA SEMANA',
        anteriores: '📅 ANTERIORES'
      };

      for (var grupo in grupos) {
        if (grupos[grupo].length === 0 || totalMostradas >= maxMostrar) continue;

        html += `
          <div class="dropdown-item-text fw-bold small text-muted px-3 pt-2 pb-1" style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
            ${etiquetas[grupo]} (${grupos[grupo].length})
          </div>
        `;

        for (var i = 0; i < grupos[grupo].length && totalMostradas < maxMostrar; i++) {
          var n = grupos[grupo][i];
          totalMostradas++;

          var iconos = {
            'REPORTE': '📝',
            'TICKET': '🎫',
            'USUARIO': '👤',
            'ESTADO': '🔄',
            'APROBACION': '✅',
            'PAGO': '💰',
            'SISTEMA': '⚙️'
          };
          var icono = iconos[n.tipo] || '📌';
          var claseLeida = n.leida ? 'opacity-75' : 'fw-bold';
          var bgLeida = n.leida ? '' : 'bg-light';

          // Tiempo relativo
          var tiempo = tiempoRelativo(n.fecha);

          html += `
            <div class="dropdown-item ${claseLeida} ${bgLeida}" 
                 style="cursor: pointer; padding: 10px 14px; border-bottom: 1px solid #f1f5f9;"
                 onclick="marcarNotificacionLeida(${n.id})">
              <div class="d-flex gap-2">
                <div style="flex-shrink: 0; margin-top: 2px;">
                  ${!n.leida ? '<span class="badge bg-primary rounded-pill" style="width: 8px; height: 8px; padding: 0; display: inline-block;"></span>' : ''}
                </div>
                <div style="flex: 1; min-width: 0;">
                  <div style="font-size: 13px; font-weight: ${n.leida ? '400' : '600'}; word-break: break-word;">
                    ${icono} ${n.mensaje}
                  </div>
                  <div style="font-size: 11px; color: #94a3b8; margin-top: 3px;">
                    ${tiempo} ${n.folioRelacionado ? '· ' + n.folioRelacionado : ''}
                  </div>
                  ${n.urlAccion ? `
                    <div style="margin-top: 6px;">
                      <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); irAPanel('${n.urlAccion}')" 
                              style="font-size: 10px; padding: 2px 8px;">
                        <i class="bi bi-arrow-right me-1"></i>Ir al panel
                      </button>
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          `;
        }

        if (totalMostradas >= maxMostrar) break;
      }

      if (totalMostradas < notificaciones.length) {
        html += `
          <div class="text-center text-muted small py-2" style="border-top: 1px solid #e2e8f0;">
            Mostrando ${totalMostradas} de ${notificaciones.length} notificaciones
          </div>
        `;
      }

      container.innerHTML = html;
      document.getElementById('campana-resumen').textContent =

/**
 * Calcula tiempo relativo (hace X minutos/horas/días)
 * @param {string} fechaStr - Fecha en formato string
 * @returns {string} - Tiempo relativo formateado
 */
function tiempoRelativo(fechaStr) {
  if (!fechaStr) return '—';
  
  try {
    var ahora = new Date();
    var fecha = new Date(fechaStr);
    
    if (isNaN(fecha.getTime())) return fechaStr;
    
    var diffMs = ahora - fecha;
    var diffMin = Math.floor(diffMs / 60000);
    var diffHoras = Math.floor(diffMs / 3600000);
    var diffDias = Math.floor(diffMs / 86400000);

    if (diffMin < 1) return 'Hace un momento';
    if (diffMin < 60) return 'Hace ' + diffMin + ' min';
    if (diffHoras < 24) return 'Hace ' + diffHoras + ' h';
    if (diffDias === 1) return 'Ayer';
    if (diffDias < 7) return 'Hace ' + diffDias + ' días';
    if (diffDias < 30) return 'Hace ' + Math.floor(diffDias / 7) + ' semanas';
    
    return fecha.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
  } catch (e) {
    return fechaStr;
  }
}

/**
 * Renderiza la lista de notificaciones en el dropdown
 * @param {Array} notificaciones - Array de notificaciones
 * @param {HTMLElement} container - Elemento contenedor
 * @param {number} noLeidas - Cantidad de no leídas
 */
function renderizarNotificaciones(notificaciones, container, noLeidas) {
  if (!container) return;

  // Actualizar badge
  var badge = document.getElementById('badge-notificaciones');
  if (badge) {
    if (noLeidas > 0) {
      badge.style.display = 'block';
      badge.textContent = noLeidas > 9 ? '9+' : noLeidas;
    } else {
      badge.style.display = 'none';
    }
  }

  // Actualizar total
  var totalEl = document.getElementById('campana-total');
  if (totalEl) {
    totalEl.textContent = noLeidas;
  }

  if (!notificaciones || notificaciones.length === 0) {
    container.innerHTML = `
      <div class="text-center text-muted py-5">
        <i class="bi bi-inbox" style="font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.3;"></i>
        <p style="font-size: 14px;">No tienes notificaciones</p>
        <p style="font-size: 12px; color: #94a3b8;">Las notificaciones aparecerán aquí</p>
      </div>
    `;
    document.getElementById('campana-resumen').textContent = '0 notificaciones';
    return;
  }

  // Agrupar por fecha
  var hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  var ayer = new Date(hoy);
  ayer.setDate(ayer.getDate() - 1);

  var grupos = {
    hoy: [],
    ayer: [],
    semana: [],
    anteriores: []
  };

  notificaciones.forEach(function(n) {
    var fecha = new Date(n.fecha);
    fecha.setHours(0, 0, 0, 0);
    var diff = Math.floor((hoy - fecha) / (1000 * 60 * 60 * 24));

    if (diff === 0) grupos.hoy.push(n);
    else if (diff === 1) grupos.ayer.push(n);
    else if (diff <= 7) grupos.semana.push(n);
    else grupos.anteriores.push(n);
  });

  var html = '';
  var totalMostradas = 0;
  var maxMostrar = 20;

  var etiquetas = {
    hoy: '📍 HOY',
    ayer: '📅 AYER',
    semana: '📅 ESTA SEMANA',
    anteriores: '📅 ANTERIORES'
  };

  var iconos = {
    'REPORTE': '📝',
    'TICKET': '🎫',
    'USUARIO': '👤',
    'ESTADO': '🔄',
    'APROBACION': '✅',
    'PAGO': '💰',
    'SISTEMA': '⚙️',
    'MODIFICACION_EQUIPO': '🔧',
    'MODIFICACION_COSTO': '💲'
  };

  for (var grupo in grupos) {
    if (grupos[grupo].length === 0 || totalMostradas >= maxMostrar) continue;

    html += `
      <div class="dropdown-item-text fw-bold small text-muted px-3 pt-2 pb-1" 
           style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
        ${etiquetas[grupo]} (${grupos[grupo].length})
      </div>
    `;

    for (var i = 0; i < grupos[grupo].length && totalMostradas < maxMostrar; i++) {
      var n = grupos[grupo][i];
      totalMostradas++;

      var icono = iconos[n.tipo] || '📌';
      var claseLeida = n.leida ? 'opacity-75' : 'fw-bold';
      var bgLeida = n.leida ? '' : 'bg-light';

      var tiempo = tiempoRelativo(n.fecha);

      html += `
        <div class="dropdown-item ${claseLeida} ${bgLeida}" 
             style="cursor: pointer; padding: 10px 14px; border-bottom: 1px solid #f1f5f9;"
             onclick="marcarNotificacionLeida(${n.id})">
          <div class="d-flex gap-2">
            <div style="flex-shrink: 0; margin-top: 2px;">
              ${!n.leida ? '<span class="badge bg-primary rounded-pill" style="width: 8px; height: 8px; padding: 0; display: inline-block;"></span>' : ''}
            </div>
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 13px; font-weight: ${n.leida ? '400' : '600'}; word-break: break-word;">
                ${icono} ${n.mensaje}
              </div>
              <div style="font-size: 11px; color: #94a3b8; margin-top: 3px;">
                ${tiempo} ${n.folioRelacionado ? '· ' + n.folioRelacionado : ''}
              </div>
              ${n.urlAccion ? `
                <div style="margin-top: 6px;">
                  <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); irAPanel('${n.urlAccion}')" 
                          style="font-size: 10px; padding: 2px 8px;">
                    <i class="bi bi-arrow-right me-1"></i>Ir al panel
                  </button>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    if (totalMostradas >= maxMostrar) break;
  }

  if (totalMostradas < notificaciones.length) {
    html += `
      <div class="text-center text-muted small py-2" style="border-top: 1px solid #e2e8f0;">
        Mostrando ${totalMostradas} de ${notificaciones.length} notificaciones
      </div>
    `;
  }

  container.innerHTML = html;
  
  var resumenEl = document.getElementById('campana-resumen');
  if (resumenEl) {
    resumenEl.textContent = 
      `${notificaciones.length} notificaciones · ${noLeidas} no leídas`;
  }
}

/**
 * Renderiza los controles de paginación
 * @param {number} total - Total de registros
 * @param {number} pagina - Página actual
 * @param {number} limite - Registros por página
 */
function renderPaginacion(total, pagina, limite) {
  var container = document.getElementById('paginacion-container');
  if (!container) return;

  var totalPaginas = Math.ceil(total / limite);

  if (totalPaginas <= 1) {
    container.innerHTML = `
      <div class="text-muted small text-center">
        Total: ${total} registros
      </div>
    `;
    return;
  }

  var inicio = (pagina - 1) * limite + 1;
  var fin = Math.min(pagina * limite, total);

  var html = `
    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
      <span class="text-muted small">
        Mostrando ${inicio} - ${fin} de ${total} registros
      </span>
      <div class="btn-group btn-group-sm">
  `;

  // Botón Anterior
  if (pagina > 1) {
    html += `<button class="btn btn-outline-secondary" onclick="cargarRegistros(${pagina - 1})">
      <i class="bi bi-chevron-left"></i> Anterior
    </button>`;
  }

  // ✅ NÚMEROS DE PÁGINA (con limitación para no mostrar demasiados)
  var maxPages = 5;
  var startPage = Math.max(1, pagina - Math.floor(maxPages / 2));
  var endPage = Math.min(totalPaginas, startPage + maxPages - 1);

  // Ajustar si startPage se pasó
  if (endPage - startPage < maxPages - 1) {
    startPage = Math.max(1, endPage - maxPages + 1);
  }

  // Primera página
  if (startPage > 1) {
    html += `<button class="btn btn-outline-secondary" onclick="cargarRegistros(1)">1</button>`;
    if (startPage > 2) {
      html += `<span class="btn btn-outline-secondary disabled">…</span>`;
    }
  }

  // Páginas intermedias
  for (var p = startPage; p <= endPage; p++) {
    var active = p === pagina ? 'btn-primary' : 'btn-outline-secondary';
    html += `<button class="btn ${active}" onclick="cargarRegistros(${p})">${p}</button>`;
  }

  // Última página
  if (endPage < totalPaginas) {
    if (endPage < totalPaginas - 1) {
      html += `<span class="btn btn-outline-secondary disabled">…</span>`;
    }
    html += `<button class="btn btn-outline-secondary" onclick="cargarRegistros(${totalPaginas})">${totalPaginas}</button>`;
  }

  // Botón Siguiente
  if (pagina < totalPaginas) {
    html += `<button class="btn btn-outline-secondary" onclick="cargarRegistros(${pagina + 1})">
      Siguiente <i class="bi bi-chevron-right"></i>
    </button>`;
  }

  html += `
      </div>
    </div>
  `;

  container.innerHTML = html;
}

/**
 * Carga el log de auditoría
 */
function cargarLogAuditoria() {
  var tbody = document.getElementById('auditoria-body');
  if (!tbody) return;

  tbody.innerHTML = `
    <tr><td colspan="6" class="text-center text-muted py-3">
      <div class="spinner-border spinner-border-sm me-2"></div>Cargando auditoría...
    </td></tr>
  `;

  if (!APP.token) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Sesión expirada.</td></tr>';
    return;
  }

  // Obtener filtros
  var filtros = {
    usuario: document.getElementById('fil-audit-usuario')?.value || '',
    accion: document.getElementById('fil-audit-accion')?.value || '',
    fechaDesde: document.getElementById('fil-audit-desde')?.value || '',
    fechaHasta: document.getElementById('fil-audit-hasta')?.value || '',
    limite: 200
  };

  // Cargar estadísticas
  cargarEstadisticasAuditoria();

  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">${resp.error}</td></tr>`;
        return;
      }

      var registros = resp.registros || [];

      if (registros.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No hay registros de auditoría.</td></tr>';
        document.getElementById('auditoria-total').textContent = 'Total: 0 registros';
        return;
      }

      var html = '';
      var iconosAccion = {
        'LOGIN_EXITOSO': '🔐',
        'LOGIN_FALLIDO': '❌',
        'CREAR_REPORTE': '📝',
        'APROBAR_REPORTE': '✅',
        'CREAR_TICKET': '🎫',
        'TOMAR_TICKET': '🔄',
        'RESOLVER_TICKET': '✅',
        'CREAR_USUARIO': '👤',
        'EDITAR_USUARIO': '✏️',
        'ELIMINAR_USUARIO': '🗑️',
        'AGREGAR_EQUIPO': '📦',
        'EDITAR_EQUIPO': '✏️',
        'CAMBIAR_ESTADO': '🔄'
      };

      registros.forEach(function(r) {
        var icono = iconosAccion[r.accion] || '📌';
        var badgeCls = 'badge ';
        if (r.accion.includes('EXITOSO') || r.accion === 'APROBAR_REPORTE' || r.accion === 'RESOLVER_TICKET') {
          badgeCls += 'bg-success';
        } else if (r.accion.includes('FALLIDO')) {
          badgeCls += 'bg-danger';
        } else if (r.accion.includes('CREAR')) {
          badgeCls += 'bg-primary';
        } else if (r.accion.includes('EDITAR') || r.accion.includes('CAMBIAR')) {
          badgeCls += 'bg-warning text-dark';
        } else {
          badgeCls += 'bg-secondary';
        }

        html += `
          <tr>
            <td style="font-size:12px;">${r.fecha}</td>
            <td><strong>${r.usuarioNombre || '—'}</strong></td>
            <td><span class="${badgeCls}" style="font-size:10px;">${icono} ${r.accion}</span></td>
            <td><span class="badge bg-secondary" style="font-size:10px;">${r.modulo || '—'}</span></td>
            <td style="font-size:12px;">${r.descripcion}</td>
            <td>${r.folioRelacionado ? '<code style="font-size:11px;">' + r.folioRelacionado + '</code>' : '—'}</td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
      document.getElementById('auditoria-total').textContent = 'Total: ' + registros.length + ' registros';

    })
    .withFailureHandler(function(err) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">Error: ${err.message}</td></tr>`;
    })
    .obtenerLogAuditoria(APP.token, filtros);

/**
 * Exporta el log de auditoría a CSV
 */
function exportarLogAuditoria() {
  mostrarToast('📊 Generando archivo de auditoría...', 'info');
  
  // Obtener datos de la tabla
  var rows = document.querySelectorAll('#auditoria-body tr');
  if (!rows || rows.length === 0) {
    mostrarToast('⚠️ No hay datos para exportar.', 'error');
    return;
  }

  var csv = 'Fecha,Usuario,Acción,Módulo,Descripción,Folio\n';
  rows.forEach(function(row) {
    var cells = row.querySelectorAll('td');
    if (cells.length === 0) return;
    var rowData = [];
    cells.forEach(function(cell) {
      rowData.push('"' + cell.textContent.trim() + '"');
    });
    csv += rowData.join(',') + '\n';
  });

  // Crear y descargar archivo
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var link = document.createElement('a');
  var url = URL.createObjectURL(blob);
  link.href = url;
  link.download = 'Auditoria_' + new Date().toISOString().split('T')[0] + '.csv';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

  mostrarToast('✅ Auditoría exportada correctamente', 'success');
}

/**
 * Instala o reinstala la base de datos desde la interfaz web
 * Esta función se ejecuta cuando el usuario hace clic en el botón
 */
function instalarBaseDatos() {
  const token = APP.token || obtenerToken();
  if (!token) {
    mostrarToast('❌ No se pudo obtener el token de sesión', 'error');
    return;
  }
  
  if (APP.sesion && APP.sesion.rol !== 1) {
    mostrarToast('❌ Solo administradores pueden reinstalar la base de datos', 'error');
    return;
  }
  
  const confirmacion = confirm(
    '⚠️ ¿ESTÁS SEGURO DE REINSTALAR LA BASE DE DATOS?\n\n' +
    '🔴 Esta acción BORRARÁ TODOS los datos actuales.\n' +
    '🟢 Se creará un BACKUP automático antes de continuar.\n' +
    '⏱️ El proceso puede tomar varios minutos.\n\n' +
    '¿Deseas continuar?'
  );
  
  if (!confirmacion) {
    agregarLog('⏹️ Instalación cancelada por el usuario', 'warning');
    return;
  }
  
  const confirmacionFinal = confirm(
    '⚠️ CONFIRMACIÓN FINAL\n\n' +
    '¿Estás ABSOLUTAMENTE seguro de reinstalar la base de datos?\n' +
    'Esta acción NO se puede deshacer.'
  );
  
  if (!confirmacionFinal) {
    agregarLog('⏹️ Instalación cancelada en la confirmación final', 'warning');
    return;
  }
  
  const loadingEl = document.getElementById('loadingIndicator');
  if (loadingEl) loadingEl.classList.add('active');
  
  const btnReinstalar = document.getElementById('btnReinstalar');
  if (btnReinstalar) btnReinstalar.disabled = true;
  
  agregarLog('🚀 Iniciando reinstalación de base de datos...', 'info');
  
  google.script.run
    .withSuccessHandler(function(resultado) {
      if (loadingEl) loadingEl.classList.remove('active');
      if (btnReinstalar) btnReinstalar.disabled = false;
      
      if (resultado.success) {
        agregarLog('✅ INSTALACIÓN EXITOSA', 'success');
        agregarLog(`📋 Backup creado: ${resultado.detalles?.backupId || 'N/A'}`, 'info');
        agregarLog(`📊 Hojas creadas: ${resultado.detalles?.verificacion?.detalles?.hojasExistentes || 0}`, 'info');
        
        mostrarToast(
          '✅ Instalación exitosa!\n' +
          'Backup: ' + (resultado.detalles?.backupId || 'N/A') + '\n' +
          'Hojas: ' + (resultado.detalles?.verificacion?.detalles?.hojasExistentes || 0),
          'success'
        );
        
        verificarEstado();
        
      } else {
        agregarLog(`❌ ERROR: ${resultado.mensaje}`, 'error');
        agregarLog(`Paso: ${resultado.paso || 'Desconocido'}`, 'error');
        mostrarToast('❌ Error en la instalación:\n' + resultado.mensaje, 'error');
      }
    })
    .withFailureHandler(function(error) {
      if (loadingEl) loadingEl.classList.remove('active');
      if (btnReinstalar) btnReinstalar.disabled = false;
      
      agregarLog(`💥 ERROR CRÍTICO: ${error.message}`, 'error');
      mostrarToast('Error crítico: ' + error.message, 'error');
      console.error('Error en instalarBaseDatos:', error);
    })
    .instalarBaseDatosDesdeWeb(token, {
      confirmado: true,
      forzar: false,
      crearBackup: true,
      continuarSinBackup: false
    });
}

/**
 * Verifica el estado actual de la base de datos
 */
function verificarEstado() {
  console.log('🔍 verificarEstado - Ejecutando...');
  
  const token = APP.token || obtenerToken();
  if (!token) {
    mostrarToast('❌ No se pudo obtener el token de sesión', 'error');
    return;
  }
  
  // Verificar que sea administrador
  if (APP.sesion && APP.sesion.rol !== 1) {
    mostrarToast('❌ Solo administradores pueden verificar el estado', 'error');
    return;
  }
  
  // ✅ MOSTRAR INDICADOR DE CARGA
  const loadingEl = document.getElementById('loadingIndicator');
  if (loadingEl) loadingEl.classList.add('active');
  
  agregarLog('🔍 Verificando estado del sistema...', 'info');
  
  google.script.run
    .withSuccessHandler(function(estado) {
      console.log('✅ Estado recibido:', estado);
      
      // ✅ OCULTAR INDICADOR DE CARGA
      const loadingEl = document.getElementById('loadingIndicator');
      if (loadingEl) loadingEl.classList.remove('active');
      
      const estadoElement = document.getElementById('estadoTexto');
      const detallesElement = document.getElementById('detallesTexto');
      const statusBox = document.getElementById('statusBox');
      const btnReinstalar = document.getElementById('btnReinstalar');
      
      if (!estadoElement) {
        console.warn('⚠️ No se encontró el elemento estadoTexto');
        return;
      }
      
      if (estado.instalado) {
        estadoElement.innerHTML = '✅ Base de datos instalada';
        estadoElement.className = 'status-text success';
        if (statusBox) statusBox.className = 'status-box success';
        
        const hojas = estado.detalles?.hojasExistentes || 0;
        const totalHojas = estado.detalles?.hojasRequeridas || 17;
        
        if (detallesElement) {
          var hojasHtml = '';
          if (estado.detalles?.hojasEncontradas && estado.detalles.hojasEncontradas.length > 0) {
            hojasHtml = estado.detalles.hojasEncontradas.join('\n');
          }
          
          detallesElement.innerHTML = `
            <strong>📊 Estado:</strong> ✅ Sistema operativo\n
            <strong>📋 Hojas encontradas:</strong> ${hojas} de ${totalHojas}\n
            <strong>📧 Usuario:</strong> ${estado.usuario?.email || 'Desconocido'}\n
            <strong>🎯 Rol:</strong> ${estado.usuario?.rol || 'No definido'}\n
            <strong>📅 Fecha:</strong> ${estado.timestamp ? new Date(estado.timestamp).toLocaleString() : 'No disponible'}
          `;
        }
        
        if (btnReinstalar) {
          btnReinstalar.disabled = false;
          btnReinstalar.textContent = '🚀 Reinstalar Base de Datos';
          btnReinstalar.className = 'btn btn-danger';
        }
        
        agregarLog(`✅ Sistema instalado correctamente (${hojas} de ${totalHojas} hojas)`, 'success');
        
      } else {
        estadoElement.innerHTML = '⚠️ Base de datos NO instalada';
        estadoElement.className = 'status-text warning';
        if (statusBox) statusBox.className = 'status-box warning';
        
        const hojas = estado.detalles?.hojasExistentes || 0;
        const totalHojas = estado.detalles?.hojasRequeridas || 17;
        const faltantes = estado.detalles?.hojasFaltantes || [];
        
        if (detallesElement) {
          var faltantesHtml = '';
          if (faltantes.length > 0) {
            faltantesHtml = '\n\n<strong>❌ Hojas faltantes:</strong>\n' + faltantes.join('\n');
          }
          
          detallesElement.innerHTML = `
            <strong>⚠️ Estado:</strong> Sistema incompleto\n
            <strong>📋 Hojas encontradas:</strong> ${hojas} de ${totalHojas}\n
            <strong>📧 Usuario:</strong> ${estado.usuario?.email || 'Desconocido'}\n
            <strong>🎯 Rol:</strong> ${estado.usuario?.rol || 'No definido'}\n
            ${estado.mensaje ? `\n<strong>📝 Mensaje:</strong> ${estado.mensaje}` : ''}
            ${faltantesHtml}
          `;
        }
        
        if (btnReinstalar) {
          btnReinstalar.disabled = false;
          btnReinstalar.textContent = '🚀 Instalar Base de Datos';
          btnReinstalar.className = 'btn btn-primary';
        }
        
        agregarLog(`⚠️ Sistema incompleto (${hojas} de ${totalHojas} hojas)`, 'warning');
        if (faltantes.length > 0) {
          agregarLog(`❌ Hojas faltantes: ${faltantes.join(', ')}`, 'error');
        }
      }
    })
    .withFailureHandler(function(error) {
      console.error('❌ Error en verificarEstado:', error);
      
      // ✅ OCULTAR INDICADOR DE CARGA EN CASO DE ERROR
      if (loadingEl) loadingEl.classList.remove('active');
      
      agregarLog(`❌ Error al verificar estado: ${error.message}`, 'error');
      mostrarToast('Error al verificar estado: ' + error.message, 'error');
    })
    .obtenerEstadoInstalacionWeb(token);
}

/**
 * Abre el modal para gestionar técnicos autorizados de un ticket
 * @param {string} ticketId - ID del ticket
 */
function abrirGestionTecnicos(ticketId) {
  // 1. Mostrar modal de carga
  const modalHtml = `
    <div class="modal fade" id="modalGestionTecnicos" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">👥 Técnicos autorizados - ${ticketId}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="gestionTecnicosBody">
            <div class="text-center py-4">
              <div class="spinner-border"></div>
              <p class="mt-2">Cargando técnicos...</p>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            <button class="btn btn-primary" onclick="guardarTecnicosAutorizados('${ticketId}')">
              <i class="bi bi-save me-1"></i>Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
  `;

  // Eliminar modal existente si hay
  const existingModal = document.getElementById('modalGestionTecnicos');
  if (existingModal) existingModal.remove();

  // Insertar modal
  document.body.insertAdjacentHTML('beforeend', modalHtml);

  // Mostrar modal
  const modal = new bootstrap.Modal(document.getElementById('modalGestionTecnicos'));
  modal.show();

  // Cargar datos
  cargarTecnicosParaGestion(ticketId);
}

/**
 * Carga la lista de técnicos y los autorizados actuales
 * @param {string} ticketId - ID del ticket
 */
function cargarTecnicosParaGestion(ticketId) {
  const body = document.getElementById('gestionTecnicosBody');
  if (!body) return;

  // Obtener lista de técnicos y autorizados del ticket
  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        body.innerHTML = `<div class="alert alert-danger">${resp.error || 'Error al cargar'}</div>`;
        return;
      }

      const tecnicos = resp.tecnicos || [];
      const autorizados = resp.autorizados || [];

      if (tecnicos.length === 0) {
        body.innerHTML = `<div class="text-muted text-center">No hay técnicos disponibles.</div>`;
        return;
      }

      // Renderizar checkboxes
      let html = `
        <div class="mb-3">
          <button class="btn btn-sm btn-outline-primary" onclick="seleccionarTodosTecnicos(true)">
            <i class="bi bi-check-all me-1"></i>Seleccionar todos
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="seleccionarTodosTecnicos(false)">
            <i class="bi bi-x me-1"></i>Deseleccionar todos
          </button>
        </div>
        <div class="list-group" id="listaTecnicosGestion">
      `;

      tecnicos.forEach(function(tecnico) {
        const checked = autorizados.includes(tecnico.id) ? 'checked' : '';
        html += `
          <label class="list-group-item d-flex align-items-center gap-3">
            <input type="checkbox" class="form-check-input tecnico-check" 
                   value="${tecnico.id}" ${checked}>
            <span><strong>${tecnico.nombre}</strong> <span class="text-muted small">(${tecnico.id})</span></span>
          </label>
        `;
      });

      html += `</div>`;
      body.innerHTML = html;

    })
    .withFailureHandler(function(err) {
      body.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
    })
    .obtenerTecnicosYAutorizados(APP.token, ticketId);
}

/**
 * Selecciona o deselecciona todos los técnicos
 * @param {boolean} seleccionar - true para seleccionar todos, false para deseleccionar
 */
function seleccionarTodosTecnicos(seleccionar) {
  const checkboxes = document.querySelectorAll('.tecnico-check');
  checkboxes.forEach(function(cb) {
    cb.checked = seleccionar;
  });
}

/**
 * Guarda la lista de técnicos autorizados para un ticket
 * @param {string} ticketId - ID del ticket
 */
function guardarTecnicosAutorizados(ticketId) {
  const checkboxes = document.querySelectorAll('.tecnico-check:checked');
  const autorizados = Array.from(checkboxes).map(function(cb) { return cb.value; });

  if (autorizados.length === 0) {
    if (!confirm('⚠️ ¿Seguro que quieres dejar el ticket sin técnicos autorizados? Nadie podrá verlo.')) {
      return;
    }
  }

  mostrarToast('💾 Guardando técnicos autorizados...', 'info');

  google.script.run
    .withSuccessHandler(function(resp) {
      if (resp.ok) {
        mostrarToast('✅ Técnicos autorizados actualizados correctamente', 'success');
        const modal = bootstrap.Modal.getInstance(document.getElementById('modalGestionTecnicos'));
        if (modal) modal.hide();
        cargarTickets(); // Recargar tabla
      } else {
        mostrarToast('❌ Error: ' + resp.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ Error: ' + err.message, 'error');
    })
    .guardarTecnicosAutorizados(APP.token, ticketId, autorizados);
}
